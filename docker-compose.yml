services:
  discipline:
    build: .
    container_name: discipline
    restart: unless-stopped
    ports:
      - "${DISCIPLINE_PORT:-8899}:8899"
    environment:
      - EARLY_RISE_TOKEN=${DISCIPLINE_TOKEN:-changeme}
      - EARLY_RISE_DB=/app/data/earlyrise.db
      - EARLY_RISE_STATIC=/portal
      - OBSIDIAN_VAULT=/vault
      - HERMES_HOME=/hermes-home
    volumes:
      - ./data:/app/data
      - ${OBSIDIAN_VAULT_PATH:-~/Documents/Obsidian Vault}:/vault:ro
      - /opt/hermes-data:/hermes-home:ro
