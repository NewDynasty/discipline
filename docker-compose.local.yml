# docker-compose.local.yml — 本地 Docker 统一入口
# 代理模式：portal 静态文件本地，/api/* 转发到云端
# 唯一数据源 = 云端 ECS SQLite
#
# 用法:
#   docker compose -f docker-compose.local.yml up -d --build
#   docker compose -f docker-compose.local.yml logs -f discipline

services:
  discipline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cc-discipline
    restart: unless-stopped
    ports:
      - "8898:8899"
    environment:
      - API_UPSTREAM=https://junethebest.cn
      - EARLY_RISE_STATIC=/portal
      - OBSIDIAN_VAULT=/vault
      - HERMES_HOME=/hermes-home
      - PORT=8899
    volumes:
      - ${OBSIDIAN_VAULT_PATH:-~/Documents/Obsidian Vault}:/vault:ro
      - ${HERMES_HOME:-~/.hermes}:/hermes-home:ro
    networks:
      - cc-network

networks:
  cc-network:
    name: cc-network
