<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ж—©иө·жү“еҚЎ В· EARLY RISE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #fafafa;
    color: #111;
    line-height: 1.6;
  }

  /* Login */
  .login-overlay {
    position: fixed; inset: 0;
    background: #fafafa;
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .login-box {
    text-align: center;
    max-width: 320px;
  }
  .login-box h1 {
    font-size: 48px; font-weight: 900; letter-spacing: -2px;
    margin-bottom: 32px;
  }
  .login-box input[type="password"] {
    font-family: inherit;
    font-size: 16px; padding: 12px 16px;
    border: 2px solid #ddd; background: #fff;
    width: 100%; outline: none; text-align: center;
    margin-bottom: 16px;
  }
  .login-box input:focus { border-color: #111; }
  .login-box button {
    background: #111; color: #fff; border: none;
    padding: 12px 40px; font-size: 14px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; font-family: inherit;
    transition: background 0.2s;
  }
  .login-box button:hover { background: #333; }
  .login-error { color: #c00; font-size: 13px; margin-top: 12px; min-height: 20px; }

  /* Hero Section */
  .hero {
    text-align: center;
    padding: 80px 20px 60px;
    max-width: 800px;
    margin: 0 auto;
  }
  .hero h1 {
    font-size: 64px; font-weight: 900; letter-spacing: -2px;
    margin-bottom: 8px; line-height: 1;
  }
  .hero .subtitle {
    font-size: 14px; color: #888;
    letter-spacing: 4px; text-transform: uppercase;
    margin-bottom: 48px;
  }
  .target-time { font-size: 14px; color: #666; margin-bottom: 8px; }
  
  .streak-number {
    font-size: 96px; font-weight: 900; letter-spacing: -4px;
    line-height: 1; margin-bottom: 4px;
  }
  .streak-label {
    font-size: 14px; color: #888;
    letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 40px;
  }
  .stats-row {
    display: flex; justify-content: center;
    gap: 48px; margin-bottom: 20px;
  }
  .stat-item { text-align: center; }
  .stat-value { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
  .stat-label {
    font-size: 11px; color: #999;
    letter-spacing: 2px; text-transform: uppercase; margin-top: 4px;
  }

  /* Check-in */
  .checkin-section {
    text-align: center; padding: 20px;
    max-width: 800px; margin: 0 auto 40px;
  }
  .time-input-wrap {
    display: flex; align-items: center;
    justify-content: center; gap: 12px; margin-bottom: 16px;
  }
  .time-input-wrap label {
    font-size: 13px; color: #666; letter-spacing: 1px;
  }
  .time-input-wrap input[type="time"] {
    font-family: 'Inter', monospace;
    font-size: 20px; font-weight: 600;
    padding: 8px 16px; border: 2px solid #ddd;
    background: #fff; text-align: center; outline: none;
  }
  .time-input-wrap input[type="time"]:focus { border-color: #111; }
  
  .checkin-btn {
    background: #111; color: #fff; border: none;
    padding: 16px 48px; font-size: 16px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s; font-family: inherit;
  }
  .checkin-btn:hover { background: #333; transform: scale(1.02); }
  .checkin-msg { margin-top: 12px; font-size: 13px; color: #888; min-height: 20px; }

  /* Milestones */
  .milestones {
    max-width: 800px; margin: 0 auto 60px; padding: 0 20px;
  }
  .section-title {
    font-size: 12px; font-weight: 700; letter-spacing: 4px;
    text-transform: uppercase; color: #999;
    margin-bottom: 24px; padding-bottom: 12px;
    border-bottom: 1px solid #e5e5e5;
  }
  .milestone-row {
    display: flex; align-items: center;
    gap: 16px; margin-bottom: 12px; font-size: 14px;
  }
  .milestone-icon {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .milestone-done { background: #111; color: #fff; }
  .milestone-pending { background: #e5e5e5; color: #999; }
  .milestone-text { color: #333; }
  .milestone-text span { color: #999; font-size: 12px; margin-left: 8px; }

  /* Heatmap */
  .heatmap-section {
    max-width: 900px; margin: 0 auto 60px;
    padding: 0 20px; overflow-x: auto;
  }
  .heatmap-grid {
    display: grid;
    grid-template-rows: repeat(7, 14px);
    grid-auto-flow: column; grid-auto-columns: 14px;
    gap: 3px; margin-bottom: 8px;
  }
  .heatmap-cell {
    width: 14px; height: 14px; border-radius: 2px;
    background: #ebedf0; position: relative; cursor: default;
  }
  .heatmap-cell.checked { background: #111; }
  .heatmap-cell.missed { background: #f0c0c0; }
  .heatmap-cell.today { outline: 2px solid #111; outline-offset: 1px; }
  .heatmap-cell.future { background: #f5f5f5; }
  .heatmap-cell .tooltip {
    display: none; position: absolute; bottom: 100%; left: 50%;
    transform: translateX(-50%); background: #111; color: #fff;
    padding: 4px 8px; border-radius: 3px; font-size: 11px;
    white-space: nowrap; z-index: 10; margin-bottom: 4px;
  }
  .heatmap-cell:hover .tooltip { display: block; }
  .heatmap-legend {
    display: flex; align-items: center;
    gap: 4px; font-size: 11px; color: #999; margin-top: 8px;
  }
  .heatmap-legend span {
    display: inline-block; width: 14px; height: 14px; border-radius: 2px;
  }

  /* Recent Log */
  .recent-log {
    max-width: 800px; margin: 0 auto 80px; padding: 0 20px;
  }
  .log-entry {
    display: flex; align-items: center;
    gap: 16px; padding: 12px 0;
    border-bottom: 1px solid #f0f0f0; font-size: 14px;
  }
  .log-date {
    color: #999; font-size: 12px; min-width: 100px;
    font-variant-numeric: tabular-nums;
  }
  .log-time { font-weight: 600; min-width: 60px; }
  .log-status {
    font-size: 12px; padding: 2px 8px; border-radius: 3px; font-weight: 600;
  }
  .log-status.pass { background: #111; color: #fff; }
  .log-status.fail { background: #f0f0f0; color: #ccc; }
  .log-empty {
    color: #ccc; font-size: 13px; text-align: center; padding: 40px;
  }

  /* Logout */
  .logout-btn {
    position: fixed; top: 16px; right: 16px;
    background: none; border: 1px solid #ddd;
    padding: 6px 12px; font-size: 11px;
    color: #999; cursor: pointer; font-family: inherit;
    letter-spacing: 1px; transition: all 0.2s;
  }
  .logout-btn:hover { border-color: #111; color: #111; }

  @media (max-width: 600px) {
    .hero h1 { font-size: 36px; }
    .streak-number { font-size: 56px; }
    .stats-row { gap: 24px; }
    .stat-value { font-size: 24px; }
  }
</style>
</head>
<body>

<!-- Login Overlay -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <h1>EARLY RISE</h1>
    <input type="password" id="login-pwd" placeholder="иҫ“е…ҘеҜҶз Ғ" autofocus>
    <br><br>
    <button onclick="doLogin()">иҝӣе…Ҙ</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<button class="logout-btn" onclick="doLogout()">йҖҖеҮә</button>

<div class="hero">
  <h1>EARLY RISE</h1>
  <div class="subtitle">every morning В· no excuses</div>
  <div class="target-time">зӣ®ж Үиө·еәҠж—¶й—ҙпјҡжҜҸеӨ© 07:00</div>
  <div id="streak-num" class="streak-number">-</div>
  <div class="streak-label">иҝһз»ӯжү“еҚЎеӨ©ж•°</div>
  <div class="stats-row">
    <div class="stat-item">
      <div id="total-days" class="stat-value">-</div>
      <div class="stat-label">жҖ»жү“еҚЎ</div>
    </div>
    <div class="stat-item">
      <div id="avg-time" class="stat-value">-</div>
      <div class="stat-label">е№іеқҮиө·еәҠ</div>
    </div>
    <div class="stat-item">
      <div id="best-time" class="stat-value">-</div>
      <div class="stat-label">жңҖж—©иө·еәҠ</div>
    </div>
    <div class="stat-item">
      <div id="rate" class="stat-value">-</div>
      <div class="stat-label">иҫҫж ҮзҺҮ</div>
    </div>
  </div>
</div>

<div class="checkin-section">
  <div class="time-input-wrap">
    <label>д»ҠеӨ©иө·еәҠж—¶й—ҙ</label>
    <input type="time" id="wake-time" value="07:00">
  </div>
  <button class="checkin-btn" onclick="doCheckin()">жү“еҚЎ</button>
  <div class="checkin-msg" id="checkin-msg"></div>
</div>

<div class="milestones">
  <div class="section-title">йҮҢзЁӢзў‘</div>
  <div id="milestone-list"></div>
</div>

<div class="heatmap-section">
  <div class="section-title">жү“еҚЎзғӯеҠӣеӣҫ</div>
  <div id="heatmap" class="heatmap-grid"></div>
  <div class="heatmap-legend">
    зјәеҚЎ <span style="background:#f0c0c0"></span>
    <span style="background:#ebedf0"></span>
    <span style="background:#111"></span> иҫҫж Ү
  </div>
</div>

<div class="recent-log">
  <div class="section-title">жңҖиҝ‘жү“еҚЎи®°еҪ•</div>
  <div id="log-list"></div>
</div>

<script>
const API = '';
let authToken = null;

// --- Auth ---
function getToken() {
  return localStorage.getItem('er_token') || null;
}

function setToken(t) {
  authToken = t;
  if (t) localStorage.setItem('er_token', t);
  else localStorage.removeItem('er_token');
}

async function api(path, opts = {}) {
  const headers = opts.headers || {};
  if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
  const res = await fetch(API + path, { ...opts, headers });
  if (res.status === 401) {
    setToken(null);
    showLogin();
    throw new Error('жңӘзҷ»еҪ•');
  }
  return res;
}

function showLogin() {
  document.getElementById('login-overlay').style.display = 'flex';
}

function hideLogin() {
  document.getElementById('login-overlay').style.display = 'none';
}

async function doLogin() {
  const pwd = document.getElementById('login-pwd').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  
  try {
    const res = await fetch(API + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd }),
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.detail || 'зҷ»еҪ•еӨұиҙҘ';
      return;
    }
    setToken(data.token);
    hideLogin();
    await loadAll();
  } catch(e) {
    errEl.textContent = 'зҪ‘з»ңй”ҷиҜҜ';
  }
}

async function doLogout() {
  try { await api('/api/auth/logout', { method: 'POST' }); } catch(e) {}
  setToken(null);
  showLogin();
}

// --- Checkin ---
async function doCheckin() {
  const time = document.getElementById('wake-time').value;
  if (!time) return;
  
  try {
    const res = await api('/api/checkin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ wake_time: time }),
    });
    const data = await res.json();
    if (!res.ok) {
      document.getElementById('checkin-msg').textContent = data.detail || 'жү“еҚЎеӨұиҙҘ';
      return;
    }
    document.getElementById('checkin-msg').textContent =
      data.pass_ ? 'вң“ иҫҫж ҮпјҒз»§з»ӯдҝқжҢҒ' : 'вң— жңӘиҫҫж ҮпјҢжҳҺеӨ©еҠ жІ№';
    await loadAll();
  } catch(e) {
    document.getElementById('checkin-msg').textContent = 'зҪ‘з»ңй”ҷиҜҜ';
  }
}

// --- Load Data ---
async function loadAll() {
  try {
    const [statsRes, recordsRes, heatmapRes, todayRes] = await Promise.all([
      api('/api/stats'),
      api('/api/records?days=90'),
      api('/api/heatmap'),
      api('/api/checkin/today'),
    ]);
    
    const stats = await statsRes.json();
    const records = await recordsRes.json();
    const heatmap = await heatmapRes.json();
    const today = await todayRes.json();
    
    renderStats(stats);
    renderMilestones(stats.streak);
    renderHeatmap(heatmap);
    renderLog(records);
    
    if (today.wake_time) {
      document.getElementById('wake-time').value = today.wake_time;
      document.getElementById('checkin-msg').textContent =
        today.pass ? 'вң“ д»Ҡж—Ҙе·Іжү“еҚЎиҫҫж Ү' : 'вң— д»Ҡж—Ҙе·Іжү“еҚЎпјҲжңӘиҫҫж Үпјү';
    }
  } catch(e) {
    if (e.message !== 'жңӘзҷ»еҪ•') console.error(e);
  }
}

function renderStats(s) {
  document.getElementById('streak-num').textContent = s.streak;
  document.getElementById('total-days').textContent = s.total;
  document.getElementById('avg-time').textContent = s.avg_time || '--:--';
  document.getElementById('best-time').textContent = s.best_time || '--:--';
  document.getElementById('rate').textContent = s.rate ? s.rate + '%' : '0%';
}

function renderMilestones(streak) {
  const ms = [3,7,14,21,30,60,100,200,365,500,730,1000];
  const emojis = ['рҹҢұ','рҹ”Ҙ','рҹ’Ә','вҡЎ','рҹҸҶ','рҹҺҜ','рҹ’Һ','рҹ‘‘','рҹҢҹ','рҹҡҖ','рҹҸ”пёҸ','вҷҫпёҸ'];
  document.getElementById('milestone-list').innerHTML = ms.map((m, i) => {
    const done = streak >= m;
    return '<div class="milestone-row">' +
      '<div class="milestone-icon ' + (done ? 'milestone-done' : 'milestone-pending') + '">' +
        (done ? emojis[i] : m) + '</div>' +
      '<div class="milestone-text">' + m + ' еӨ©иҝһз»ӯиҫҫж Ү' +
        (done ? '<span>вң“ е·ІиҫҫжҲҗ</span>' : '<span>иҝҳе·® ' + (m - streak) + ' еӨ©</span>') +
      '</div></div>';
  }).join('');
}

function renderHeatmap(records) {
  const recMap = {};
  records.forEach(r => recMap[r.date] = r);
  
  // Find earliest record date, show from 7 days before that
  let startDate = new Date();
  if (records.length) {
    const earliest = records.reduce((a, b) => a.date < b.date ? a : b);
    startDate = new Date(earliest.date + 'T00:00:00');
    startDate.setDate(startDate.getDate() - 7);
  }
  
  // Align to Sunday
  while (startDate.getDay() !== 0) startDate.setDate(startDate.getDate() - 1);
  
  // End 30 days from now
  const endDate = new Date();
  endDate.setDate(endDate.getDate() + 30);
  
  const todayStr = new Date().toISOString().split('T')[0];
  const html = [];
  const d = new Date(startDate);
  
  while (d <= endDate) {
    const ds = d.toISOString().split('T')[0];
    const rec = recMap[ds];
    const isToday = ds === todayStr;
    const isFuture = d > new Date();
    
    let cls = 'heatmap-cell';
    if (rec && rec.pass) cls += ' checked';
    else if (rec && !rec.pass) cls += ' missed';
    if (isToday) cls += ' today';
    if (isFuture) cls += ' future';
    
    const tooltip = rec
      ? ds + ' ' + rec.wake_time + (rec.pass ? ' вң“' : ' вң—')
      : isFuture ? ds : ds + ' жңӘжү“еҚЎ';
    
    html.push('<div class="' + cls + '"><div class="tooltip">' + tooltip + '</div></div>');
    d.setDate(d.getDate() + 1);
  }
  
  document.getElementById('heatmap').innerHTML = html.join('');
}

function renderLog(records) {
  if (!records.length) {
    document.getElementById('log-list').innerHTML =
      '<div class="log-empty">иҝҳжІЎжңүжү“еҚЎи®°еҪ•пјҢд»ҠеӨ©е°ұејҖе§Ӣеҗ§</div>';
    return;
  }
  document.getElementById('log-list').innerHTML = records.slice(0, 14).map(r =>
    '<div class="log-entry">' +
    '<div class="log-date">' + r.date + '</div>' +
    '<div class="log-time">' + r.wake_time + '</div>' +
    '<div class="log-status ' + (r.pass ? 'pass' : 'fail') + '">' +
      (r.pass ? 'иҫҫж Ү' : 'жңӘиҫҫж Ү') + '</div></div>'
  ).join('');
}

// --- Init ---
async function init() {
  const token = getToken();
  if (token) {
    authToken = token;
    // Verify token
    try {
      await api('/api/stats');
      hideLogin();
      await loadAll();
    } catch(e) {
      showLogin();
    }
  } else {
    showLogin();
  }
  
  // Set default time
  const now = new Date();
  document.getElementById('wake-time').value =
    String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
}

// Enter key on login
document.getElementById('login-pwd').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

init();
</script>
</body>
</html>
