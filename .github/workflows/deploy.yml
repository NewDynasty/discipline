name: Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch: # 支持手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.event.after }}"
            CHANGELOG=$(git log --format="- \`%h\` %s" "${BEFORE}..${AFTER}" 2>/dev/null || echo "- \`${GITHUB_SHA:0:7}\` $(git log -1 --format=%s)")
          else
            CHANGELOG="- \`${GITHUB_SHA:0:7}\` $(git log -1 --format=%s)"
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            cd /opt/discipline-git
            bash deploy/deploy.sh
          script_stop: true

      - name: Notify Feishu
        if: always()
        run: |
          python3 deploy/notify_feishu.py
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          DEPLOY_STATUS: ${{ job.status }}
          DEPLOY_CHANGELOG: ${{ steps.changelog.outputs.changelog }}
