<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graph — Command Center</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<style>
  @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e2e8f0; font-family: Inter, -apple-system, sans-serif; overflow: hidden; height: 100vh; }

  /* Top bar */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 48px; background: rgba(10,10,15,0.9); backdrop-filter: blur(12px);
    border-bottom: 1px solid #1e293b;
    display: flex; align-items: center; padding: 0 20px; gap: 16px;
  }
  .topbar a { color: #94a3b8; text-decoration: none; font-size: 13px; font-weight: 500; }
  .topbar a:hover { color: #f59e0b; }
  .topbar .sep { color: #334155; }
  .topbar .current { color: #f59e0b; }

  /* Controls */
  .controls {
    position: fixed; top: 56px; right: 16px; z-index: 100;
    background: rgba(17,24,39,0.95); border: 1px solid #1e293b; border-radius: 12px;
    padding: 12px; width: 240px;
    transition: transform 0.3s ease;
  }
  /* When detail panel is open, push controls left */
  .controls.shifted { right: 288px; }
  .controls input[type=text] {
    width: 100%; background: #0f172a; border: 1px solid #1e293b; color: #e2e8f0;
    padding: 8px 12px; border-radius: 8px; font-size: 13px; outline: none;
  }
  .controls input:focus { border-color: #f59e0b; }
  .controls .stat { font-size: 11px; color: #64748b; margin-top: 8px; }
  .legend { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
  .legend span { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: #1e293b; }
  .folder-btn {
    background: none; border: 1px solid #1e293b; color: #94a3b8; padding: 4px 10px;
    border-radius: 6px; font-size: 11px; cursor: pointer; margin-top: 8px; margin-right: 4px;
    transition: all 0.15s;
  }
  .folder-btn:hover, .folder-btn.active { border-color: #f59e0b; color: #f59e0b; }

  /* Graph container */
  #graph { width: 100vw; height: 100vh; }

  /* Tooltip */
  .tooltip {
    position: fixed; z-index: 200; pointer-events: none;
    background: rgba(17,24,39,0.95); border: 1px solid #334155; border-radius: 8px;
    padding: 8px 12px; font-size: 12px; display: none; max-width: 280px;
    backdrop-filter: blur(8px);
  }
  .tooltip .tt-name { font-weight: 600; color: #f59e0b; margin-bottom: 2px; }
  .tooltip .tt-folder { color: #64748b; font-size: 11px; }
  .tooltip .tt-tags { color: #94a3b8; font-size: 11px; margin-top: 2px; }

  /* Loading */
  .loading {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #64748b; font-size: 14px; z-index: 50;
  }
  .loading .spinner {
    width: 32px; height: 32px; border: 2px solid #1e293b; border-top-color: #f59e0b;
    border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Mobile toggle button for controls */
  .controls-toggle {
    display: none;
    position: fixed; top: 56px; right: 12px; z-index: 101;
    background: rgba(17,24,39,0.95); border: 1px solid #1e293b;
    color: #f59e0b; border-radius: 8px; padding: 6px 10px;
    font-size: 16px; cursor: pointer; line-height: 1;
  }

  @media(max-width:768px){
    .topbar{padding:0 12px;gap:10px}
    .topbar a,.topbar .current{font-size:12px}

    /* Controls: collapsible panel */
    .controls-toggle{display:block}
    .controls{
      top:52px; right:8px; left:8px; width:auto;
      display:none;
      max-height:calc(100vh - 64px); overflow-y:auto;
    }
    .controls.open{display:block}

    .controls input[type=text]{font-size:14px;padding:10px 12px}
    .legend span{font-size:12px;padding:3px 10px}
    .folder-btn{font-size:12px;padding:5px 12px}

    /* Tooltip clamp within viewport */
    .tooltip{max-width:200px;font-size:13px}

    /* Loading text */
    .loading{font-size:13px}

    /* Ensure graph fills all space */
    #graph{width:100vw;height:100vh}
  }

  /* ========== Light theme ========== */
  [data-theme="light"] body { background: #ffffff; color: #1d1d1f; }

  [data-theme="light"] .topbar {
    background: rgba(255,255,255,0.92);
    border-bottom-color: #e5e5ea;
  }
  [data-theme="light"] .topbar a { color: #86868b; }
  [data-theme="light"] .topbar a:hover { color: #0071e3; }
  [data-theme="light"] .topbar .sep { color: #d1d1d6; }
  [data-theme="light"] .topbar .current { color: #0071e3; }

  [data-theme="light"] .controls {
    background: rgba(245,245,247,0.96);
    border-color: #e5e5ea;
  }
  [data-theme="light"] .controls input[type=text] {
    background: #ffffff; border-color: #e5e5ea; color: #1d1d1f;
  }
  [data-theme="light"] .controls input:focus { border-color: #0071e3; }
  [data-theme="light"] .controls .stat { color: #86868b; }
  [data-theme="light"] .legend span { background: #f5f5f7; }
  [data-theme="light"] .folder-btn { border-color: #e5e5ea; color: #86868b; }
  [data-theme="light"] .folder-btn:hover,
  [data-theme="light"] .folder-btn.active { border-color: #0071e3; color: #0071e3; }

  [data-theme="light"] #graph { background: #f8fafc; }

  [data-theme="light"] .tooltip {
    background: rgba(245,245,247,0.96); border-color: #e5e5ea;
  }
  [data-theme="light"] .tooltip .tt-name { color: #0071e3; }
  [data-theme="light"] .tooltip .tt-folder { color: #86868b; }
  [data-theme="light"] .tooltip .tt-tags { color: #6e6e73; }

  [data-theme="light"] .loading { color: #86868b; }
  [data-theme="light"] .loading .spinner { border-color: #e5e5ea; border-top-color: #0071e3; }

  [data-theme="light"] .controls-toggle {
    background: rgba(245,245,247,0.96); border-color: #e5e5ea; color: #0071e3;
  }

  /* Theme toggle button */
  .theme-toggle {
    background: none; border: none; cursor: pointer; padding: 4px;
    color: #94a3b8; display: flex; align-items: center; justify-content: center;
    transition: color 0.2s; margin-left: auto; border-radius: 6px;
  }
  .theme-toggle:hover { color: #f59e0b; }
  [data-theme="light"] .theme-toggle { color: #86868b; }
  [data-theme="light"] .theme-toggle:hover { color: #0071e3; }

  /* Control buttons */
  .ctrl-btns { margin-top: 10px; display: flex; gap: 6px; }
  .ctrl-btn {
    flex: 1; background: #0f172a; border: 1px solid #1e293b; color: #94a3b8;
    padding: 6px; border-radius: 6px; cursor: pointer; font-size: 14px;
    transition: all 0.15s; text-align: center;
  }
  .ctrl-btn:hover { border-color: #f59e0b; color: #f59e0b; }
  [data-theme="light"] .ctrl-btn { background: #fff; border-color: #e5e5ea; color: #86868b; }
  [data-theme="light"] .ctrl-btn:hover { border-color: #0071e3; color: #0071e3; }

  /* Detail panel */
  .detail-panel {
    position: fixed; top: 56px; right: 16px; z-index: 100; width: 260px;
    background: rgba(17,24,39,0.95); border: 1px solid #1e293b; border-radius: 12px;
    padding: 16px; display: none; backdrop-filter: blur(12px);
    max-height: calc(100vh - 80px); overflow-y: auto;
  }
  .detail-panel.open { display: block; }
  [data-theme="light"] .detail-panel { background: rgba(245,245,247,0.96); border-color: #e5e5ea; }

  .dp-close { position: absolute; top: 8px; right: 12px; font-size: 20px; cursor: pointer;
    color: #64748b; line-height: 1; transition: color .15s; }
  .dp-close:hover { color: #f59e0b; }
  [data-theme="light"] .dp-close { color: #86868b; }
  [data-theme="light"] .dp-close:hover { color: #0071e3; }

  .dp-name { font-weight: 700; font-size: 15px; color: #f59e0b; margin-bottom: 4px; padding-right: 24px; word-break: break-all; }
  [data-theme="light"] .dp-name { color: #0071e3; }

  .dp-folder { font-size: 12px; margin-bottom: 6px; }

  .dp-stat { font-size: 11px; color: #64748b; margin-bottom: 10px; }
  [data-theme="light"] .dp-stat { color: #86868b; }

  .dp-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
  .dp-tags span { font-size: 11px; background: #1e293b; color: #94a3b8; padding: 2px 8px; border-radius: 4px; }
  [data-theme="light"] .dp-tags span { background: #f5f5f7; color: #6e6e73; }

  .dp-neighbors { border-top: 1px solid #1e293b; padding-top: 8px; margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 4px; }
  [data-theme="light"] .dp-neighbors { border-top-color: #e5e5ea; }

  .dp-nb { font-size: 11px; padding: 3px 8px; border-radius: 4px; border: 1px solid #334155;
    color: #e2e8f0; cursor: pointer; transition: all .15s; text-decoration: none;
    background: transparent; display: inline-block; }
  .dp-nb:hover { background: #1e293b; }
  [data-theme="light"] .dp-nb { border-color: #e5e5ea; color: #1d1d1f; }
  [data-theme="light"] .dp-nb:hover { background: #f5f5f7; }

  .dp-more { font-size: 11px; color: #64748b; padding: 3px 8px; }

  .dp-open { display: block; text-align: center; font-size: 13px; padding: 8px; border-radius: 8px;
    background: #1e293b; color: #f59e0b; text-decoration: none; transition: all .15s; }
  .dp-open:hover { background: #f59e0b; color: #0a0a0f; }
  [data-theme="light"] .dp-open { background: #f5f5f7; color: #0071e3; }
  [data-theme="light"] .dp-open:hover { background: #0071e3; color: #fff; }
</style>
</head>
<body>
<script src="/static/shared-nav.js?v=5"></script>
<button class="controls-toggle" id="controlsToggle" onclick="document.getElementById('controlsPanel').classList.toggle('open')">☰</button>

<div class="controls" id="controlsPanel">
  <input type="text" id="search" placeholder="搜索节点...">
  <div class="stat" id="stats">加载中...</div>
  <div id="folderFilter"></div>
  <div class="legend" id="legend"></div>
  <div class="legend" id="edgeLegend" style="margin-top:8px;"></div>
  <div class="ctrl-btns">
    <button class="ctrl-btn" onclick="fitView()" title="适配视图">⊞</button>
    <button class="ctrl-btn" onclick="reLayout()" title="重新布局">⟳</button>
  </div>
</div>

<!-- Detail panel (right side) -->
<div id="detailPanel" class="detail-panel"></div>

<div class="tooltip" id="tooltip">
  <div class="tt-name"></div>
  <div class="tt-folder"></div>
  <div class="tt-tags"></div>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  构建知识图谱...
</div>

<div id="graph"></div>

<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<script>
const FOLDER_COLORS = {
  Bookmarks: "#f59e0b", Kanban: "#3b82f6", Notes: "#10b981",
  People: "#ec4899", Research: "#8b5cf6", TaskLog: "#64748b",
  Workspace: "#06b6d4", PlanPipeline: "#f97316"
};

let network, visNodes, visEdges, allData;
const activeFolders = new Set();
let selectedNode = null;

function isLight() { return document.documentElement.getAttribute('data-theme') === 'light'; }
function hlColor() { return isLight() ? '#0071e3' : '#f59e0b'; }
function bgColor() { return isLight() ? '#f8fafc' : '#0a0a0f'; }
function dimColor() { return isLight() ? 'rgba(200,200,200,0.2)' : 'rgba(30,41,59,0.15)'; }
function fontColor() { return isLight() ? '#1d1d1f' : '#e2e8f0'; }
function mutedColor() { return isLight() ? '#86868b' : '#64748b'; }

async function init() {
  try {
    const resp = await fetch("/api/docs/graph");
    allData = await resp.json();
    document.getElementById("loading").style.display = "none";
    updateStats(allData.nodes.length, allData.edges.length);
    buildFolderFilter();
    buildLegend();
    document.getElementById('graph').style.backgroundColor = bgColor();
    renderGraph(allData);
  } catch (e) {
    document.getElementById("loading").innerHTML = '😕 加载失败: ' + e.message;
  }
}

function buildFolderFilter() {
  const folders = [...new Set(allData.nodes.map(n => n.folder))].sort();
  const container = document.getElementById("folderFilter");
  folders.forEach(f => {
    activeFolders.add(f);
    const btn = document.createElement("button");
    btn.className = "folder-btn active";
    btn.textContent = f;
    btn.style.borderColor = FOLDER_COLORS[f] || "#64748b";
    btn.style.color = FOLDER_COLORS[f] || "#64748b";
    btn.onclick = () => {
      if (activeFolders.has(f)) { activeFolders.delete(f); btn.classList.remove("active"); }
      else { activeFolders.add(f); btn.classList.add("active"); }
      applyFilters();
    };
    container.appendChild(btn);
  });
}

function buildLegend() {
  const el = document.getElementById("legend");
  for (const [folder, color] of Object.entries(FOLDER_COLORS)) {
    if (allData.nodes.some(n => n.folder === folder)) {
      el.innerHTML += '<span style="color:'+color+';border-color:'+color+'">'+folder+'</span>';
    }
  }
  const edgeEl = document.getElementById("edgeLegend");
  const edgeTypes = [
    { type: "link", label: "链接", color: "#64748b" },
    { type: "tag", label: "标签", color: "#3b82f6" },
    { type: "keyword", label: "关键词", color: "#10b981" },
    { type: "folder", label: "同目录", color: "#475569" },
  ];
  const present = new Set(allData.edges.map(e => e.type));
  for (const et of edgeTypes) {
    if (present.has(et.type)) {
      edgeEl.innerHTML += '<span style="color:'+et.color+';border-color:'+et.color+'">━ '+et.label+'</span>';
    }
  }
}

function getFilteredData() {
  const query = document.getElementById("search").value.toLowerCase();
  let fNodes = allData.nodes.filter(n => activeFolders.has(n.folder));
  if (query) {
    fNodes = fNodes.filter(n =>
      n.label.toLowerCase().includes(query) ||
      n.tags.some(t => t.toLowerCase().includes(query))
    );
  }
  const nodeIds = new Set(fNodes.map(n => n.id));
  const fEdges = allData.edges.filter(e => nodeIds.has(e.from) && nodeIds.has(e.to));
  return { nodes: fNodes, edges: fEdges };
}

function updateStats(nc, ec) {
  document.getElementById("stats").textContent = nc + ' 节点 · ' + ec + ' 连接';
}

function applyFilters() {
  selectedNode = null;
  hideDetail();
  const data = getFilteredData();
  updateStats(data.nodes.length, data.edges.length);
  renderGraph(data);
}

function makeVisNode(n) {
  return {
    id: n.id, label: n.label, size: n.size, shape: "dot", borderWidth: 1,
    color: {
      background: FOLDER_COLORS[n.folder] || "#64748b",
      border: FOLDER_COLORS[n.folder] || "#64748b",
      highlight: { background: hlColor(), border: hlColor() },
      hover: { background: hlColor(), border: hlColor() }
    },
    font: { color: fontColor(), size: 11, face: "Inter, sans-serif" },
    title: n.label + ' (' + n.folder + ')'
  };
}

function makeVisEdge(e) {
  const light = isLight();
  const EDGE_COLORS = {
    link:    { color: light ? "rgba(100,116,139,0.40)" : "rgba(100,116,139,0.30)", highlight: hlColor(), hover: hlColor() },
    tag:     { color: light ? "rgba(59,130,246,0.40)"  : "rgba(59,130,246,0.30)",  highlight: "#3b82f6", hover: "#3b82f6" },
    keyword: { color: light ? "rgba(16,185,129,0.35)"  : "rgba(16,185,129,0.25)",  highlight: "#10b981", hover: "#10b981" },
    folder:  { color: light ? "rgba(100,116,139,0.12)" : "rgba(100,116,139,0.08)", highlight: "#64748b", hover: "#64748b" },
  };
  const ec = EDGE_COLORS[e.type] || EDGE_COLORS.link;
  return {
    from: e.from, to: e.to, color: ec,
    width: e.type === "folder" ? 0.5 : 1,
    smooth: { type: "continuous" },
    title: e.type === "tag" ? 'tag: ' + e.tag :
           e.type === "keyword" ? 'keywords: ' + (e.words||[]).join(", ") :
           e.type === "folder" ? 'folder: ' + e.folder : "link",
  };
}

function renderGraph(data) {
  visNodes = new vis.DataSet(data.nodes.map(makeVisNode));
  visEdges = new vis.DataSet(data.edges.map(makeVisEdge));

  const container = document.getElementById("graph");
  if (network) {
    network.setData({ nodes: visNodes, edges: visEdges });
    network.fit({ animation: { duration: 300, easingFunction: 'easeInOutQuad' } });
    return;
  }

  const options = {
    physics: {
      forceAtlas2Based: { gravitationalConstant: -60, centralGravity: 0.01, springLength: 120, springConstant: 0.06 },
      maxVelocity: 50, solver: "forceAtlas2Based", timestep: 0.35,
      stabilization: { iterations: 150 }
    },
    interaction: {
      hover: true, tooltipDelay: 0, zoomView: true, dragView: true,
      navigationButtons: false, multiselect: true
    },
    nodes: { scaling: { min: 8, max: 40 } },
    edges: { arrowStrikethrough: false }
  };

  network = new vis.Network(container, { nodes: visNodes, edges: visEdges }, options);

  // Freeze physics after stabilization for smooth interaction
  network.once("stabilizationIterationsDone", () => {
    network.setOptions({ physics: { enabled: false } });
    network.fit({ animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
  });

  // Single click → focus on node (highlight neighbors)
  network.on("click", function(params) {
    if (params.nodes.length === 1) {
      focusNode(params.nodes[0]);
    } else if (params.nodes.length === 0 && params.edges.length === 0) {
      unfocusAll();
    }
  });

  // Double click → open doc
  network.on("doubleClick", function(params) {
    if (params.nodes.length > 0) {
      var nodeId = params.nodes[0];
      window.open("/docs#" + nodeId.replace(/\.md$/, ""), "_blank");
    }
  });

  // Hover tooltip
  var tooltip = document.getElementById("tooltip");
  network.on("hoverNode", function(params) {
    var n = allData.nodes.find(function(x) { return x.id === params.node; });
    if (!n) return;
    tooltip.querySelector(".tt-name").textContent = n.label;
    tooltip.querySelector(".tt-folder").textContent = n.folder;
    tooltip.querySelector(".tt-tags").textContent = n.tags.length ? "#" + n.tags.join(" #") : "";
    tooltip.style.display = "block";
    var ttW = tooltip.offsetWidth || 200;
    var ttH = tooltip.offsetHeight || 60;
    var tx = params.event.pageX + 12;
    var ty = params.event.pageY + 12;
    if (tx + ttW > window.innerWidth - 8) tx = params.event.pageX - ttW - 8;
    if (ty + ttH > window.innerHeight - 8) ty = params.event.pageY - ttH - 8;
    tooltip.style.left = Math.max(8, tx) + "px";
    tooltip.style.top = Math.max(8, ty) + "px";
  });
  network.on("blurNode", function() { tooltip.style.display = "none"; });
}

/* ========== Node focus / neighbor highlight ========== */
function focusNode(nodeId) {
  selectedNode = nodeId;
  var connectedIds = new Set([nodeId]);
  // Find all edges touching this node
  var data = getFilteredData();
  data.edges.forEach(function(e) {
    if (e.from === nodeId) connectedIds.add(e.to);
    if (e.to === nodeId) connectedIds.add(e.from);
  });

  // Update node visuals
  var updates = data.nodes.map(function(n) {
    if (n.id === nodeId) {
      return { id: n.id, borderWidth: 3, size: n.size * 1.6, opacity: 1.0 };
    } else if (connectedIds.has(n.id)) {
      return { id: n.id, borderWidth: 2, opacity: 1.0 };
    } else {
      return { id: n.id, borderWidth: 1, opacity: 0.12, font: { color: dimColor(), size: 9 } };
    }
  });
  visNodes.update(updates);

  // Dim non-connected edges
  var edgeUpdates = data.edges.map(function(e) {
    var connected = (e.from === nodeId || e.to === nodeId);
    return {
      id: e.from + '-' + e.to + '-' + e.type,
      hidden: !connected,
      color: connected ? undefined : { color: 'transparent' }
    };
  });
  // vis edges don't have id by default; use setData approach
  // Simpler: just update node opacity is enough; edges auto-fade via node opacity
  
  // Show detail panel
  showDetail(nodeId, connectedIds.size - 1, data);
}

function unfocusAll() {
  selectedNode = null;
  hideDetail();
  var data = getFilteredData();
  var updates = data.nodes.map(function(n) {
    return {
      id: n.id, borderWidth: 1, size: n.size, opacity: 1.0,
      font: { color: fontColor(), size: 11 }
    };
  });
  visNodes.update(updates);
}

/* ========== Detail panel ========== */
function showDetail(nodeId, neighborCount, data) {
  var n = allData.nodes.find(function(x) { return x.id === nodeId; });
  if (!n) return;
  var panel = document.getElementById("detailPanel");
  document.getElementById("controlsPanel").classList.add("shifted");
  var html = '<div class="dp-close" onclick="unfocusAll()">&times;</div>';
  html += '<div class="dp-name">' + n.label + '</div>';
  html += '<div class="dp-folder" style="color:' + (FOLDER_COLORS[n.folder]||'#64748b') + '">' + n.folder + '</div>';
  html += '<div class="dp-stat">' + neighborCount + ' 个连接</div>';
  if (n.tags && n.tags.length) {
    html += '<div class="dp-tags">' + n.tags.map(function(t) { return '<span>#' + t + '</span>'; }).join('') + '</div>';
  }
  // Connected nodes list
  var neighbors = [];
  data.edges.forEach(function(e) {
    if (e.from === nodeId && !neighbors.find(function(x){return x.id===e.to})) {
      var tn = allData.nodes.find(function(x){return x.id===e.to});
      if (tn) neighbors.push({ id: e.to, label: tn.label, folder: tn.folder, type: e.type });
    }
    if (e.to === nodeId && !neighbors.find(function(x){return x.id===e.from})) {
      var tn2 = allData.nodes.find(function(x){return x.id===e.from});
      if (tn2) neighbors.push({ id: e.from, label: tn2.label, folder: tn2.folder, type: e.type });
    }
  });
  if (neighbors.length) {
    html += '<div class="dp-neighbors">';
    neighbors.slice(0, 20).forEach(function(nb) {
      var col = FOLDER_COLORS[nb.folder] || '#64748b';
      html += '<a class="dp-nb" onclick="focusNode(\'' + nb.id.replace(/'/g, "\\'") + '\')" style="border-color:' + col + '">' + nb.label + '</a>';
    });
    if (neighbors.length > 20) html += '<span class="dp-more">...+' + (neighbors.length - 20) + '</span>';
    html += '</div>';
  }
  html += '<a class="dp-open" href="/docs#' + nodeId.replace(/\.md$/, '') + '" target="_blank">📄 打开文档</a>';
  panel.innerHTML = html;
  panel.classList.add("open");
}

function hideDetail() {
  document.getElementById("detailPanel").classList.remove("open");
  document.getElementById("controlsPanel").classList.remove("shifted");
}

/* ========== Physics & layout controls ========== */
function reLayout() {
  if (!network) return;
  network.setOptions({ physics: { enabled: true, stabilization: { iterations: 100 } } });
  network.stabilize(100);
  network.once("stabilizationIterationsDone", function() {
    network.setOptions({ physics: { enabled: false } });
    network.fit({ animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
  });
}

function fitView() {
  if (network) network.fit({ animation: { duration: 300, easingFunction: 'easeInOutQuad' } });
}

// Search debounce
var searchTimer;
document.getElementById("search").addEventListener("input", function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilters, 250);
});

// Listen for theme changes from shared-nav.js
var _themeObserver = new MutationObserver(function() {
  if (network) {
    document.getElementById('graph').style.backgroundColor = bgColor();
    // Re-render with new theme colors
    var data = getFilteredData();
    if (selectedNode) unfocusAll();
    renderGraph(data);
  }
});
_themeObserver.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

init();
</script>
