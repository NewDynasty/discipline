<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favicon Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e2e8f0; font-family: -apple-system, SF Pro Display, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { max-width: 720px; width: 100%; padding: 40px; }
  h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
  p.sub { color: #64748b; margin-bottom: 32px; font-size: 14px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .card { background: #111827; border: 1px solid #1e293b; border-radius: 16px; padding: 24px; text-align: center; transition: all 0.2s; cursor: pointer; }
  .card:hover { border-color: #3b82f6; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(59,130,246,0.15); }
  .card .preview { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 16px; }
  .card .preview img { border-radius: 6px; }
  .card .name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  .card .desc { color: #64748b; font-size: 12px; }
  .sizes { display: flex; align-items: center; gap: 8px; }
  .tag { background: #1e293b; padding: 2px 6px; border-radius: 4px; font-size: 10px; color: #94a3b8; }
</style>
</head>
<body>
<div class="container">
  <h1>🎨 Command Center Favicon</h1>
  <p class="sub">选一个喜欢的风格，点击可放大预览</p>
  <div class="grid">
    <div class="card" onclick="document.getElementById('picked').value='hex-bolt'">
      <div class="preview">
        <img src="favicon-hex-bolt.svg" width="64" height="64">
        <img src="favicon-hex-bolt.svg" width="32" height="32">
        <img src="favicon-hex-bolt.svg" width="16" height="16">
      </div>
      <div class="name">⚡ Hex Bolt</div>
      <div class="desc">六边形 + 闪电，科技感强</div>
    </div>
    <div class="card" onclick="document.getElementById('picked').value='terminal'">
      <div class="preview">
        <img src="favicon-terminal.svg" width="64" height="64">
        <img src="favicon-terminal.svg" width="32" height="32">
        <img src="favicon-terminal.svg" width="16" height="16">
      </div>
      <div class="name">⌨️ Terminal</div>
      <div class="desc">经典命令行提示符 >_</div>
    </div>
    <div class="card" onclick="document.getElementById('picked').value='cc-mono'">
      <div class="preview">
        <img src="favicon-cc-mono.svg" width="64" height="64">
        <img src="favicon-cc-mono.svg" width="32" height="32">
        <img src="favicon-cc-mono.svg" width="16" height="16">
      </div>
      <div class="name">🔵 CC Monogram</div>
      <div class="desc">极简 CC 字母 + 同心圆</div>
    </div>
    <div class="card" onclick="document.getElementById('picked').value='dashboard'">
      <div class="preview">
        <img src="favicon-dashboard.svg" width="64" height="64">
        <img src="favicon-dashboard.svg" width="32" height="32">
        <img src="favicon-dashboard.svg" width="16" height="16">
      </div>
      <div class="name">📊 Dashboard</div>
      <div class="desc">控制面板网格，蓝紫配色</div>
    </div>
    <div class="card" onclick="document.getElementById('picked').value='zen-cmd'">
      <div class="preview">
        <img src="favicon-zen-cmd.svg" width="64" height="64">
        <img src="favicon-zen-cmd.svg" width="32" height="32">
        <img src="favicon-zen-cmd.svg" width="16" height="16">
      </div>
      <div class="name">⌘ Zen Command</div>
      <div class="desc">Command 键 + 禅圆，琥珀色</div>
    </div>
    <div class="card" onclick="document.getElementById('picked').value='rocket'">
      <div class="preview">
        <img src="favicon-rocket.svg" width="64" height="64">
        <img src="favicon-rocket.svg" width="32" height="32">
        <img src="favicon-rocket.svg" width="16" height="16">
      </div>
      <div class="name">🚀 Rocket</div>
      <div class="desc">火箭发射，金橙色活力</div>
    </div>
  </div>
  <div style="margin-top: 24px; text-align: center;">
    <input type="text" id="picked" readonly placeholder="点击选择..." style="background: #111827; border: 1px solid #1e293b; color: #e2e8f0; padding: 8px 16px; border-radius: 8px; width: 200px; text-align: center; font-size: 14px;">
  </div>
</div>
</body>
</html>
