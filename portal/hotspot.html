<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 热点追踪</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
[data-theme="dark"] body{background:#0a0a0f}
.iframe-wrap{width:100%;height:calc(100vh - 52px);border:none;display:block}
.fallback{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100vh - 52px);color:#86868b;text-align:center;padding:40px}
.fallback .icon{font-size:64px;margin-bottom:16px}
.fallback h2{font-size:22px;font-weight:700;color:#1d1d1f;margin-bottom:8px}
[data-theme="dark"] .fallback h2{color:#e2e8f0}
.fallback p{font-size:15px;max-width:440px;line-height:1.5}
.fallback code{background:#f5f5f7;padding:2px 8px;border-radius:4px;font-size:13px}
[data-theme="dark"] .fallback code{background:#1e293b}
</style>
</head>
<body>
<script src="shared-nav.js"></script>
<div class="fallback" id="fallback" style="display:none">
  <div class="icon">📡</div>
  <h2>热点服务未启动</h2>
  <p>Datasette 服务当前不可用。</p>
  <p style="margin-top:12px">启动命令：<code>datasette data/hotspot.db --port 8200 --cors</code></p>
</div>
<script>
// Detect environment: cloud (same origin /hotspot/) vs local (direct :8200)
const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
const datasetteUrl = isLocal ? 'http://localhost:8200/hotspot' : '/hotspot/';

const frame = document.createElement('iframe');
frame.className = 'iframe-wrap';
frame.src = datasetteUrl;
frame.allow = 'clipboard-write';
frame.onerror = function() {
  frame.style.display = 'none';
  document.getElementById('fallback').style.display = 'flex';
};
document.body.appendChild(frame);
</script>
</body>
</html>
