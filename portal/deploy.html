<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deploy · Command Center</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/cc-styles.css">
<script src="/static/cc-components.js"></script>
<script src="/static/shared-nav.js?v=7"></script>
<style>
/* ═══ Page-specific styles ═══ */

/* Hero / page header */
.deploy-hero{padding:60px 22px 20px;max-width:860px;margin:0 auto}
.deploy-hero h1{font-size:28px;font-weight:700;margin-bottom:4px}
.deploy-hero p{font-size:14px;color:#86868b}

/* Service Cards */
.service-card{background:#f5f5f7;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #e5e5ea;transition:all .15s}
.service-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.service-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.service-info{flex:1}
.service-name{font-size:16px;font-weight:600}
.service-meta{font-size:12px;color:#86868b;display:flex;gap:12px;margin-top:2px;flex-wrap:wrap}
.service-status{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:500;white-space:nowrap}
.status-running{background:rgba(52,199,89,.12);color:#34c759}
.status-stopped{background:rgba(255,59,48,.1);color:#ff3b30}
.status-deploying{background:rgba(255,149,0,.12);color:#ff9500}

/* Version Section */
.version-section{border-top:1px solid #e5e5ea;padding-top:14px;margin-top:14px}
.version-current{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;flex-wrap:wrap}
.version-current code{background:var(--code-bg,#f0f0f3);padding:2px 8px;border-radius:4px;font-size:12px;font-family:'SF Mono',Menlo,monospace}
.version-label{color:#86868b;font-size:12px}

/* Commit History */
.commit-list{max-height:200px;overflow-y:auto;margin-bottom:14px;border:1px solid #e5e5ea;border-radius:8px}
.commit-item{display:flex;align-items:center;gap:10px;padding:8px 12px;font-size:12px;border-bottom:1px solid #e5e5ea;cursor:pointer;transition:background .1s}
.commit-item:last-child{border-bottom:none}
.commit-item:hover{background:#fff}
.commit-item.selected{background:rgba(0,113,227,.08);border-left:3px solid #0071e3}
.commit-hash{font-family:'SF Mono',Menlo,monospace;color:#0071e3;font-weight:500;min-width:68px}
.commit-msg{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.commit-time{color:#86868b;font-size:11px;white-space:nowrap}

/* Deploy Actions */
.deploy-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.deploy-hint{font-size:11px;color:#86868b}

/* Deploy Log */
.deploy-log{margin-top:14px;border-top:1px solid #e5e5ea;padding-top:14px}
.log-box{background:#f0f0f3;border-radius:8px;padding:12px;font-family:'SF Mono',Menlo,monospace;font-size:11px;line-height:1.6;max-height:240px;overflow-y:auto;color:#86868b}
.log-box .log-ok{color:#34c759}
.log-box .log-err{color:#ff3b30}
.log-box .log-info{color:#0071e3}
.log-box .log-warn{color:#ff9500}

/* Progress Bar */
.deploy-progress{height:4px;background:#e5e5ea;border-radius:2px;margin:10px 0;overflow:hidden}
.deploy-progress-bar{height:100%;background:#0071e3;border-radius:2px;transition:width .3s;width:0}

/* Responsive */
@media(max-width:768px){
  .deploy-hero{padding:40px 16px 16px}
  .deploy-hero h1{font-size:22px}
  .service-header{flex-wrap:wrap}
  .commit-msg{max-width:120px}
}

/* Dark theme overrides */
[data-theme="dark"] .service-card{background:#1c1c1e;border-color:#2c2c2e}
[data-theme="dark"] .service-icon{background:rgba(255,255,255,.06)}
[data-theme="dark"] .version-section{border-top-color:#2c2c2e}
[data-theme="dark"] .version-current code{background:#1c1c1e}
[data-theme="dark"] .commit-list{border-color:#2c2c2e}
[data-theme="dark"] .commit-item{border-bottom-color:#2c2c2e}
[data-theme="dark"] .commit-item:hover{background:#0a0a0a}
[data-theme="dark"] .commit-item.selected{background:rgba(10,132,255,.12)}
[data-theme="dark"] .commit-hash{color:#0a84ff}
[data-theme="dark"] .deploy-log{border-top-color:#2c2c2e}
[data-theme="dark"] .log-box{background:#111}
[data-theme="dark"] .deploy-progress{background:#2c2c2e}
[data-theme="dark"] .status-running{background:rgba(52,199,89,.15);color:#30d158}
[data-theme="dark"] .status-stopped{background:rgba(255,59,48,.15);color:#ff453a}
[data-theme="dark"] .status-deploying{background:rgba(255,149,0,.15);color:#ff9f0a}
</style>
</head>
<body>

<div class="cc-page">
  <div class="deploy-hero">
    <h1>部署中心</h1>
    <p>一键拉取 GitHub 最新代码并部署到 ECS，支持指定版本回滚。</p>
  </div>

  <!-- Service: Discipline -->
  <div class="service-card" id="svc-discipline">
    <div class="service-header">
      <div class="service-icon" style="background:rgba(0,113,227,.12)">☀️</div>
      <div class="service-info">
        <div class="service-name">Discipline</div>
        <div class="service-meta">
          <span>ECS · 47.108.143.237:8899</span>
          <span>Docker · python:3.11-slim</span>
          <span>/opt/discipline-git</span>
        </div>
      </div>
      <span class="service-status status-running">● 运行中</span>
    </div>

    <div class="version-section">
      <div class="version-current">
        <span class="version-label">当前版本</span>
        <code id="current-hash">-</code>
        <span class="version-label" id="current-msg">loading...</span>
        <span class="version-label" id="current-time"></span>
      </div>

      <!-- Commit History (collapsed by default) -->
      <div id="commit-section" style="display:none">
        <div style="font-size:12px;color:#86868b;margin-bottom:6px">选择部署版本（点击选中，再点部署）</div>
        <div class="commit-list" id="commit-list">
          <!-- Populated by JS -->
        </div>
      </div>

      <div class="deploy-actions">
        <button class="cc-btn cc-btn-primary" id="btn-deploy-latest" onclick="deploy('latest')">🚀 部署最新版</button>
        <button class="cc-btn cc-btn-secondary" id="btn-select-version" onclick="toggleCommits()">📋 选择版本</button>
        <button class="cc-btn cc-btn-secondary" id="btn-deploy-selected" style="display:none" onclick="deploy('selected')" disabled>⬆️ 部署选中版本</button>
        <button class="cc-btn cc-btn-secondary" onclick="checkStatus()">🔍 检查状态</button>
        <span class="deploy-hint" id="deploy-hint"></span>
      </div>

      <div class="deploy-progress" id="progress-bar" style="display:none">
        <div class="deploy-progress-bar" id="progress-fill"></div>
      </div>

      <div class="deploy-log" id="log-section" style="display:none">
        <div class="log-box" id="log-box"></div>
      </div>
    </div>
  </div>

</div>

<script>
// --- State ---
let selectedHash=null;
let deploying=false;

// --- API Config ---
// Deploy page uses its own deploy_token (separate from cc_token)
const API_BASE='/api/deploy';
function getDeployToken(){
  return localStorage.getItem('deploy_token')||CC.getToken()||'';
}
function getAuthHeaders(){
  return {'Authorization':'Bearer '+getDeployToken(),'Content-Type':'application/json'};
}

function showPasswordModal(){
  return new Promise(resolve=>{
    // If modal already exists, reuse it
    let modal=document.getElementById('pw-modal');
    if(modal){modal.style.display='flex';return;}
    modal=document.createElement('div');
    modal.id='pw-modal';
    modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:9999';
    modal.innerHTML=`
      <div style="background:var(--bg,#fff);border-radius:16px;padding:32px;width:340px;border:1px solid #e5e5ea">
        <div style="font-size:18px;font-weight:600;margin-bottom:8px">🔐 部署认证</div>
        <div style="font-size:13px;color:#86868b;margin-bottom:16px">请输入部署密码以继续</div>
        <input type="password" id="pw-input" placeholder="部署密码"
          style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid #e5e5ea;background:transparent;color:inherit;font-size:14px;margin-bottom:16px;outline:none">
        <div id="pw-error" style="font-size:12px;color:#ff3b30;margin-bottom:8px;display:none"></div>
        <div style="display:flex;gap:10px">
          <button id="pw-cancel" class="cc-btn cc-btn-secondary" style="flex:1;border-radius:8px">取消</button>
          <button id="pw-ok" class="cc-btn cc-btn-primary" style="flex:1;border-radius:8px">确认</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
    const inp=document.getElementById('pw-input');
    const err=document.getElementById('pw-error');
    inp.focus();
    inp.onkeydown=e=>{if(e.key==='Enter')document.getElementById('pw-ok').click();};
    document.getElementById('pw-cancel').onclick=()=>{modal.style.display='none';resolve(null);};
    document.getElementById('pw-ok').onclick=()=>{
      const v=inp.value.trim();
      if(!v){err.textContent='请输入密码';err.style.display='block';return;}
      localStorage.setItem('deploy_token',v);
      modal.style.display='none';
      resolve(v);
    };
  });
}

async function api(path,opts={}){
  const res=await CC.fetch(API_BASE+path,{
    ...opts,
    headers:{...getAuthHeaders(),...(opts.headers||{})}
  });
  if(res.status===401){
    // Try getting deploy_token from user instead of infinite reload
    const token=await showPasswordModal();
    if(!token) throw new Error('需要部署密码');
    // Retry with new token
    const res2=await CC.fetch(API_BASE+path,{
      ...opts,
      headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json',...(opts.headers||{})}
    });
    if(res2.status===401){
      localStorage.removeItem('deploy_token');
      throw new Error('密码错误，请重试');
    }
    if(!res2.ok)throw new Error(await res2.text());
    return res2.json();
  }
  if(!res.ok)throw new Error(await res.text());
  return res.json();
}

// --- Load Status ---
async function loadStatus(){
  try{
    const d=await api('/status');
    const badge=document.querySelector('.service-status');
    if(d.container.running){
      badge.className='service-status status-running';
      badge.textContent='● 运行中';
    }else{
      badge.className='service-status status-stopped';
      badge.textContent='● 已停止';
    }
    if(d.commit){
      document.getElementById('current-hash').textContent=d.commit.hash;
      document.getElementById('current-msg').textContent=d.commit.message;
      document.getElementById('current-time').textContent=d.commit.time;
    }
  }catch(e){
    console.error('Status load failed:',e);
    document.getElementById('current-msg').textContent='认证失败，请点击任意操作按钮输入密码';
  }
}
loadStatus();

// --- Toggle commit list ---
function toggleCommits(){
  const sec=document.getElementById('commit-section');
  const btn=document.getElementById('btn-select-version');
  const deploySel=document.getElementById('btn-deploy-selected');
  if(sec.style.display==='none'){
    sec.style.display='block';
    btn.textContent='📋 收起';
    renderCommits();
  }else{
    sec.style.display='none';
    btn.textContent='📋 选择版本';
    deploySel.style.display='none';
    selectedHash=null;
  }
}

async function renderCommits(){
  const list=document.getElementById('commit-list');
  list.innerHTML='<div style="padding:12px;color:#86868b;font-size:12px">加载中...</div>';
  try{
    const d=await api('/commits?count=10');
    list.innerHTML=d.commits.map(c=>`
      <div class="commit-item" data-hash="${c.hash}" onclick="selectCommit('${c.hash}',this)">
        <span class="commit-hash">${c.hash.slice(0,7)}</span>
        <span class="commit-msg">${escHtml(c.message)}</span>
        <span class="commit-time">${c.time}</span>
      </div>
    `).join('');
  }catch(e){list.innerHTML='<div style="padding:12px;color:#ff3b30;font-size:12px">加载失败: '+e.message+'</div>';}
}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function selectCommit(hash,el){
  document.querySelectorAll('.commit-item').forEach(x=>x.classList.remove('selected'));
  el.classList.add('selected');
  selectedHash=hash;
  const btn=document.getElementById('btn-deploy-selected');
  btn.style.display='inline-block';
  btn.disabled=false;
  btn.textContent=`⬆️ 部署 ${hash.slice(0,7)}`;
}

// --- Deploy ---
async function deploy(mode){
  if(deploying)return;
  deploying=true;
  const hash=mode==='selected'?selectedHash:'latest';
  if(mode==='selected'&&!hash){CC.toast('请先选择一个版本','warn');deploying=false;return;}

  const btnLatest=document.getElementById('btn-deploy-latest');
  const btnSelected=document.getElementById('btn-deploy-selected');
  const hint=document.getElementById('deploy-hint');
  const progressBar=document.getElementById('progress-bar');
  const progressFill=document.getElementById('progress-fill');
  const logSection=document.getElementById('log-section');
  const logBox=document.getElementById('log-box');

  btnLatest.disabled=true;
  if(btnSelected)btnSelected.disabled=true;
  hint.textContent='';
  logBox.innerHTML='';
  logSection.style.display='block';
  progressBar.style.display='block';
  progressFill.style.width='0%';

  appendLog(`🚀 开始部署 ref=${hash==='latest'?'origin/main':hash}`,'info');

  try{
    await api('/run',{method:'POST',body:{ref:hash}});

    let done=false;
    while(!done){
      await sleep(2000);
      progressFill.style.width=Math.min(90,parseInt(progressFill.style.width)+10)+'%';
      try{
        const s=await api('/status');
        if(!s.deploying){done=true;}
      }catch(e){done=true;}
    }

    progressFill.style.width='100%';

    try{
      const final=await api('/status');
      if(final.last_result&&final.last_result.steps){
        final.last_result.steps.forEach(s=>appendLog(s.message,s.ok?'ok':'err'));
      }
    }catch(e){}

    appendLog('✅ 部署完成！','ok');
    hint.textContent='✅ 部署完成';
    CC.toast('部署完成','ok');
    await loadStatus();
  }catch(e){
    progressFill.style.width='100%';
    appendLog('❌ '+e.message,'err');
    hint.textContent='❌ 部署失败';
    CC.toast('部署失败: '+e.message,'error');
  }

  btnLatest.disabled=false;
  if(btnSelected)btnSelected.disabled=false;
  deploying=false;
}

function appendLog(text,type=''){
  const box=document.getElementById('log-box');
  const cls=type==='ok'?'log-ok':type==='err'?'log-err':type==='warn'?'log-warn':'log-info';
  box.innerHTML+=`<div class="${cls}">${text}</div>`;
  box.scrollTop=box.scrollHeight;
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

// --- Check Status ---
async function checkStatus(){
  const logBox=document.getElementById('log-box');
  logBox.innerHTML='';
  document.getElementById('log-section').style.display='block';
  appendLog('--- 状态检查 ---','info');
  try{
    const d=await api('/status');
    appendLog(`Container: ${d.container.status} ${d.container.running?'✅':'❌'}`,d.container.running?'ok':'err');
    appendLog(`Disk: ${d.resource.disk}`,'ok');
    appendLog(`Memory: ${d.resource.memory}`,'ok');
    if(d.commit)appendLog(`Version: ${d.commit.hash} ${d.commit.message}`,'ok');
    if(d.deploying)appendLog('⚠️ 正在部署中...','warn');
  }catch(e){appendLog('❌ '+e.message,'err');}
}
</script>
</body>
</html>
