<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Center</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/cc-styles.css">
<style>
  /* ── Page-specific styles (not in cc-styles) ── */

  /* Quick access status dots */
  .qp-status{display:inline-block;width:10px;height:10px;border-radius:50%;margin-left:6px;vertical-align:middle;transition:background .3s,box-shadow .3s;background:#ccc}
  .qp-status.on{background:#34c759;box-shadow:0 0 6px rgba(52,199,89,.4)}
  .qp-status.off{background:#ff6b6b}
  [data-theme="dark"] .qp-status{background:#475569}

  /* Health tags for infra rows */
  .health-tags{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap}
  .health-tag{font-size:11px;padding:1px 6px;border-radius:4px;background:rgba(0,0,0,.04);color:#86868b;font-variant-numeric:tabular-nums}
  .health-tag.latency{color:#30d158}
  .health-tag.uptime{color:#0071e3}
  .health-tag.offline-since{color:#ff6b6b}
  [data-theme="dark"] .health-tag{background:rgba(255,255,255,.06)}

  /* Restart button */
  .restart-btn{background:none;border:1px solid rgba(0,0,0,.12);border-radius:6px;padding:2px 8px;font-size:16px;cursor:pointer;color:#888;transition:all .2s;margin-right:6px}
  .restart-btn:hover{background:#0071e3;color:#fff;border-color:#0071e3}
  [data-theme="dark"] .restart-btn{border-color:#334155;color:#94a3b8}
  [data-theme="dark"] .restart-btn:hover{background:#f59e0b;color:#0a0a0f;border-color:#f59e0b}

  /* Checkin bar */
  .checkin-bar{max-width:980px;margin:0 auto;padding:14px 22px;background:rgba(255,255,255,.7);border-radius:14px;border:1px solid rgba(0,0,0,.06);margin-top:14px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
  .cb-left{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:500}
  .cb-icon{font-size:20px}
  .cb-btn{background:#111;color:#fff;border:none;padding:8px 28px;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
  .cb-btn:hover{background:#0071e3;transform:scale(1.03)}
  .cb-btn:disabled{background:#ccc;cursor:default;transform:none}
  .cb-done{color:#34c759;font-weight:600}
  [data-theme="dark"] .checkin-bar{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.08)}
  [data-theme="dark"] .cb-btn{background:#f59e0b;color:#0a0a0f}
  @media(max-width:768px){.checkin-bar{margin:10px 16px 0;padding:12px 16px;border-radius:12px}.cb-btn{padding:10px 32px;font-size:16px}}

  /* Triple checkin tabs */
  .cb-tabs{display:flex;gap:4px;margin-bottom:12px;border-bottom:1px solid rgba(0,0,0,.06);padding-bottom:2px}
  .cb-tab{padding:6px 16px;border-radius:8px 8px 0 0;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:#86868b;transition:all .15s;font-family:inherit}
  .cb-tab:hover{color:#0071e3;background:rgba(0,113,227,.06)}
  .cb-tab.active{color:#0071e3;font-weight:600;background:rgba(0,113,227,.08)}
  [data-theme="dark"] .cb-tabs{border-bottom-color:rgba(255,255,255,.08)}
  [data-theme="dark"] .cb-tab{color:#94a3b8}
  [data-theme="dark"] .cb-tab:hover{color:#f59e0b;background:rgba(245,158,11,.08)}
  [data-theme="dark"] .cb-tab.active{color:#f59e0b;background:rgba(245,158,11,.1)}

  .cb-panel{display:none}
  .cb-panel.active{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .cb-panel .cb-left{flex:1;min-width:0}
  .cb-form{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .cb-input{padding:6px 12px;border:1px solid rgba(0,0,0,.12);border-radius:8px;font-size:13px;width:80px;outline:none;font-family:inherit;background:#fff;color:#1d1d1f}
  .cb-input:focus{border-color:#0071e3}
  .cb-select{padding:6px 10px;border:1px solid rgba(0,0,0,.12);border-radius:8px;font-size:13px;outline:none;font-family:inherit;background:#fff;color:#1d1d1f;cursor:pointer}
  .cb-select:focus{border-color:#0071e3}
  [data-theme="dark"] .cb-input,[data-theme="dark"] .cb-select{background:#1e293b;border-color:#334155;color:#e2e8f0}
  [data-theme="dark"] .cb-input:focus,[data-theme="dark"] .cb-select:focus{border-color:#f59e0b}
  .cb-done-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:980px;font-size:12px;font-weight:600;background:#e8f8ed;color:#30d158}
  [data-theme="dark"] .cb-done-badge{background:#052e16;color:#4ade80}

  /* Mini calendar */
  .mini-cal{max-width:980px;margin:12px auto 0;display:flex;gap:4px;flex-wrap:wrap;padding:0 22px}
  .mc-cell{width:15px;height:15px;border-radius:3px;background:#e8e8ed;transition:transform .15s;cursor:default}
  .mc-cell.pass{background:#34c759}
  .mc-cell.fail{background:#ff6b6b}
  .mc-cell.future{background:transparent;border:1px dashed #c7c7cc}
  .mc-cell:hover{transform:scale(1.3);z-index:1}
  .mc-cell.today{box-shadow:0 0 0 2px #0071e3}
  [data-theme="dark"] .mc-cell{background:rgba(255,255,255,.06)}
  [data-theme="dark"] .mc-cell.pass{background:#34c759}
  [data-theme="dark"] .mc-cell.fail{background:#ff6b6b}
  [data-theme="dark"] .mc-cell.future{border-color:rgba(255,255,255,.1)}
  @media(max-width:768px){.mini-cal{padding:0 16px;gap:2px}.mc-cell{width:11px;height:11px}}

  /* Global search */
  .global-search{position:relative;max-width:520px;margin:18px auto 0}
  .global-search input{width:100%;padding:10px 16px;border-radius:10px;border:1px solid rgba(0,0,0,.1);font-size:15px;background:rgba(255,255,255,.7);outline:none;transition:border .2s}
  .global-search input:focus{border-color:#0071e3}
  [data-theme="dark"] .global-search input{background:rgba(255,255,255,.08);color:#e2e8f0;border-color:rgba(255,255,255,.12)}
  .search-results{position:absolute;top:100%;left:0;right:0;background:#fff;border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.12);max-height:320px;overflow-y:auto;display:none;z-index:100;margin-top:4px}
  .search-results.open{display:block}
  .sr-item{padding:10px 16px;border-bottom:1px solid rgba(0,0,0,.05);cursor:pointer;text-decoration:none;color:inherit;display:block}
  .sr-item:hover{background:rgba(0,113,227,.06)}
  .sr-item:last-child{border:none}
  .sr-folder{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px}
  .sr-title{font-size:14px;font-weight:500;margin-top:2px}
  [data-theme="dark"] .search-results{background:#1e1e2e;box-shadow:0 8px 30px rgba(0,0,0,.4)}
  [data-theme="dark"] .sr-item:hover{background:rgba(0,113,227,.15)}
  [data-theme="dark"] .sr-folder{color:#666}

  /* Kanban grid (page-specific layout) */
  .k-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .k-name{font-size:15px;font-weight:600;margin-bottom:3px}
  .k-count{font-size:13px;color:#86868b}
  @media(max-width:768px){.k-grid{grid-template-columns:1fr}}

  /* Dark overrides for page-specific elements */
  [data-theme="dark"] .k-name{color:#e2e8f0}
  [data-theme="dark"] .k-count{color:#94a3b8}

  /* Status bar */
  .status{display:flex;justify-content:center;gap:20px;padding:0 22px 60px;flex-wrap:wrap;font-size:13px;color:#86868b}
  [data-theme="dark"] .status{color:#94a3b8}
</style>
</head>

<script>
// Type tag colors
const typeColors={compare:'#0071e3',debug:'#ff9500',pitfall:'#ff3b30',tech:'#30d158'};
function getTypeFromTitle(t){
  const l=t.toLowerCase();
  if(l.startsWith('compare'))return'Compare';
  if(l.startsWith('debug'))return'Debug';
  if(l.startsWith('pitfall'))return'Pitfall';
  if(l.startsWith('tech'))return'Tech';
  return'Research';
}
function typeColor(t){return typeColors[t.toLowerCase()]||'#0071e3'}

// Infra icons/descs
const infraIcons={'Hermes Gateway':'🟢','Early Rise':'🟢','Codex Server':'🟢','Obsidian Kanban':'🟢','Sync-Hub':'⚪','RSSHub':'⚪'};
const infraDescs={'Hermes Gateway':'macOS 主服务。Discord / 飞书 / WebUI','Early Rise':'早起打卡。FastAPI + SQLite','Codex Server':'CLI 智能体','Obsidian Kanban':'看板桥接插件 v1.5.0','Sync-Hub':'内网多设备同步，离线','RSSHub':'本地 RSS 聚合，离线'};

// ── Checkin Tab Switching ──
function switchTab(type){
  document.querySelectorAll('.cb-tab').forEach(t=>t.classList.toggle('active',t.dataset.type===type));
  document.querySelectorAll('.cb-panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+type));
  // 切换热力图
  loadHeatmap(type);
}

// ── 运动类型中文名 ──
const exerciseNames={run:'跑步',gym:'健身',swim:'游泳',yoga:'瑜伽',walk:'步行',bike:'骑行',other:'其他'};

// ── Checkin Action ──
async function doCheckin(type){
  if(!CC.getToken()){CC.toast('请先登录','error');return;}
  const btn=document.getElementById('btn-'+type);
  btn.disabled=true;btn.textContent='打卡中...';
  let url,body;
  if(type==='wake'){
    const now=new Date();
    const time=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    url='/api/checkin';body={wake_time:time};
  }else if(type==='sleep'){
    const time=document.getElementById('sleep-time-input').value||'23:00';
    url='/api/checkin/sleep';body={sleep_time:time};
  }else{
    const etype=document.getElementById('exercise-type-input').value;
    const dur=parseInt(document.getElementById('exercise-dur-input').value)||30;
    url='/api/checkin/exercise';body={exercise_type:etype,duration:dur};
  }
  try{
    const r=await CC.fetch(url,{method:'POST',body});
    const d=await r.json();
    if(r.ok){
      CC.toast('打卡成功 ✓','ok');
      loadCheckinStatus(); // 刷新状态
    }else{CC.toast(d.detail||'打卡失败','error');btn.disabled=false;btn.textContent='打卡';}
  }catch(e){CC.toast('网络错误','error');btn.disabled=false;btn.textContent='打卡';}
}

// ── Load checkin status ──
async function loadCheckinStatus(){
  try{
    const today=await CC.fetch('/api/checkin/today').then(r=>r.json());
    if(!today||!today.types){return;}
    const typeMap={};
    (today.types||[]).forEach(t=>{typeMap[t.checkin_type]=t;});
    // 早起状态
    const ws=document.getElementById('status-wake');
    const wb=document.getElementById('btn-wake');
    if(typeMap.wake){
      ws.innerHTML='今日 <span class="cb-done">'+typeMap.wake.wake_time+'</span> 已打卡';
      wb.style.display='none';
    }else{ws.textContent='今日尚未打卡';wb.style.display='inline-block';}
    // 早睡状态
    const ss=document.getElementById('status-sleep');
    const sb=document.getElementById('btn-sleep');
    if(typeMap.sleep){
      ss.innerHTML='今日 <span class="cb-done">'+typeMap.sleep.sleep_time+'</span> 已打卡';
      sb.style.display='none';
    }else{ss.textContent='今日尚未打卡';sb.style.display='inline-block';}
    // 运动状态
    const es=document.getElementById('status-exercise');
    const eb=document.getElementById('btn-exercise');
    if(typeMap.exercise){
      const en=exerciseNames[typeMap.exercise.exercise_type]||typeMap.exercise.exercise_type;
      es.innerHTML='今日 <span class="cb-done">'+en+' '+typeMap.exercise.exercise_duration+'min</span> 已打卡';
      eb.style.display='none';
    }else{es.textContent='今日尚未打卡';eb.style.display='inline-block';}
  }catch(e){}
}

// Health formatting helpers
function fmtDuration(secs){
  if(secs<60)return secs+'s';
  if(secs<3600)return Math.floor(secs/60)+'m '+secs%60+'s';
  const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60);
  return h+'h '+m+'m';
}
function fmtRelTime(ts){
  const diff=Math.floor(Date.now()/1000-ts);
  if(diff<60)return '离线 '+diff+'s';
  if(diff<3600)return '离线 '+Math.floor(diff/60)+'m';
  if(diff<86400)return '离线 '+Math.floor(diff/3600)+'h';
  return '离线 '+Math.floor(diff/86400)+'d';
}

// Project icons by tag
const projectIcons={web:'📄',python:'🐍',game:'🎮',unity:'🏗️',godot:'🏜️',ai:'🤖',pipeline:'⚡',discipline:'☀️',research:'💡',monitor:'📡'};

function renderProjects(data){
  if(!data||!data.projects)return;
  const list=document.getElementById('projects-list');
  if(!list)return;
  list.innerHTML=data.projects.map(p=>{
    const icon=projectIcons[(p.tags||[])[0]]||'📦';
    const statusBadge=p.status==='completed'?CC.badge('✅ 已完结','on'):
      p.status==='paused'?CC.badge('暂停','off'):CC.badge('开发中','warn');
    const portStr=p.port?'<div style="font-size:12.5px;color:#aeaeb2;margin-top:2px">:'+p.port+'</div>':'';
    const pct=p.completion||0;
    const pctStr=pct>0?'<div style="font-size:12.5px;color:#aeaeb2;margin-top:2px">'+pct+'%</div>':'';
    const github=p.github?'https://github.com/'+p.github:'#';
    const techStr=(p.tech_stack||[]).slice(0,3).join(' · ');
    const desc=(p.description||'')+(techStr?' — '+techStr:'');
    const opacity=p.status==='paused'?' style="opacity:.55"':'';
    const href=p.url||github;
    return '<a class="cc-row" href="'+href+'"'+opacity+'>'+
      '<div class="cc-row-icon">'+icon+'</div>'+
      '<div class="cc-row-body"><div class="cc-row-title">'+p.project+'</div><div class="cc-row-desc">'+desc+'</div></div>'+
      '<div class="cc-row-meta">'+statusBadge+portStr+pctStr+'</div>'+
      '</a>';
  }).join('');
}

// Load all data
async function load(){
  const [status,research,kanban,er,projects]=await Promise.all([
    CC.fetch('/api/portal/status').then(r=>r.json()).catch(()=>null),
    CC.fetch('/api/portal/research').then(r=>r.json()).catch(()=>null),
    CC.fetch('/api/portal/kanban').then(r=>r.json()).catch(()=>null),
    CC.fetch('/api/portal/earlyrise').then(r=>r.json()).catch(()=>null),
    CC.fetch('/api/projects').then(r=>r.json()).catch(()=>null)
  ]);

  // Status bar
  if(status){
    const bar=document.getElementById('status-bar');
    bar.innerHTML=status.map(s=>'<span>'+CC.dot(s.online)+s.name+'</span>').join('');
  }

  // Infra list
  if(status){
    const list=document.getElementById('infra-list');
    const managedServices=['discipline','hermes-gateway'];
    list.innerHTML=status.map(s=>{
      const icon=infraIcons[s.name]||(s.online?'🟢':'⚪');
      const desc=infraDescs[s.name]||'';
      const isLink=s.online&&s.url&&s.url!=='#';
      const tag=isLink?'a':'div';
      const href=isLink?' href="'+s.url+'"':'';
      const opacity=s.online?'':' style="opacity:.45;cursor:default"';
      const bg=s.online?' style="background:#e8f8ed"':'';
      const canRestart=managedServices.includes(s.name);
      const restartBtn=canRestart?'<button class="restart-btn" onclick="event.preventDefault();restartService(\''+s.name+'\')" title="重启">↻</button>':'';
      let tags='';
      if(s.online&&s.latency_ms!=null) tags+='<span class="health-tag latency">'+s.latency_ms+'ms</span>';
      if(s.online&&s.uptime_secs>0) tags+='<span class="health-tag uptime">'+fmtDuration(s.uptime_secs)+'</span>';
      if(!s.online&&s.last_up) tags+='<span class="health-tag offline-since">'+fmtRelTime(s.last_up)+'</span>';
      return '<'+tag+' class="cc-row"'+href+opacity+'>'+
        '<div class="cc-row-icon"'+bg+'>'+icon+'</div>'+
        '<div class="cc-row-body"><div class="cc-row-title">'+s.name+'</div><div class="cc-row-desc">'+desc+'</div>'+(tags?'<div class="health-tags">'+tags+'</div>':'')+'</div>'+
        '<div class="cc-row-meta">'+restartBtn+'<div style="font-size:12.5px;color:#aeaeb2;margin-top:2px">:'+s.port+'</div></div>'+
        '</'+tag+'>';
    }).join('');
  }

  // Checkin status (all three types)
  loadCheckinStatus();

  // Mini calendar heatmap (支持多类型切换)
  let _heatmapCache={};
  async function loadHeatmap(type){
    type=type||'wake';
    if(!_heatmapCache[type]){
      try{
        _heatmapCache[type]=await CC.fetch('/api/heatmap?checkin_type='+type).then(r=>r.json()).catch(()=>[])||[];
      }catch(e){_heatmapCache[type]=[];}
    }
    const hm=_heatmapCache[type];
    const cal=document.getElementById('mini-cal');
    cal.innerHTML='';
    const now=new Date();
    const y=now.getFullYear(),m=now.getMonth();
    const daysInMonth=new Date(y,m+1,0).getDate();
    const map={};
    hm.forEach(r=>{map[r.date]={pass:r.pass,time:r.time||null};});
    const pad=new Date(y,m,1).getDay();
    for(let i=0;i<pad;i++){const c=document.createElement('div');c.className='mc-cell';c.style.background='transparent';cal.appendChild(c);}
    for(let d=1;d<=daysInMonth;d++){
      const ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      const c=document.createElement('div');
      c.className='mc-cell';
      const info=map[ds];
      if(info&&info.time){c.title=ds+' '+info.time+(info.pass?' ✓':' ✗');}
      else{c.title=ds;}
      if(ds===now.toISOString().slice(0,10))c.classList.add('today');
      if(d>now.getDate()){c.classList.add('future');}
      else if(info&&info.pass===true||info&&info.pass===1){c.classList.add('pass');}
      else if(info&&info.pass===false||info&&info.pass===0){c.classList.add('fail');}
      cal.appendChild(c);
    }
  }
  loadHeatmap('wake');

  // Quick-access service status dots
  try{
    const st=await CC.fetch('/api/portal/status').then(r=>r.json());
    const qmap={'Hermes Gateway':'hermes','Early Rise':'earlyrise','Codex Server':'codex','Obsidian Kanban':'kanban'};
    (st||[]).forEach(s=>{
      const id=qmap[s.name];
      if(id){
        const dot=document.getElementById('qps-'+id);
        if(dot){dot.className='qp-status '+(s.online?'on':'off');dot.title=s.name+(s.online?' · 在线':' · 离线');}
      }
    });
  }catch(e){}

  renderProjects(projects);
  renderCron();

  // Research list
  if(research&&research.length>0){
    const list=document.getElementById('research-list');
    list.innerHTML=research.map(n=>{
      const typ=getTypeFromTitle(n.title);
      const col=typeColor(typ);
      const label=n.title.replace(/^(compare|debug|pitfall|tech)-/i,'');
      const display=label.charAt(0).toUpperCase()+label.slice(1).replace(/-/g,' ');
      return '<a class="cc-row" href="'+(n.url||'#')+'">'+
        '<div class="cc-row-body">'+
        '<div style="color:'+col+';font-size:13.5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">'+typ+'</div>'+
        '<div class="cc-row-desc" style="color:#1d1d1f">'+display+'</div>'+
        '</div><div class="cc-row-arrow">›</div></a>';
    }).join('');
  }

  // Kanban
  if(kanban&&kanban.length>0){
    const grid=document.getElementById('kanban-grid');
    grid.innerHTML=kanban.map(b=>
      '<a class="cc-card" href="'+(b.url||'#')+'">'+
      '<div class="k-name">'+b.name+'</div>'+
      '<div class="k-count">'+b.count+'</div></a>'
    ).join('');
  }

  // Fallback for locked state
  document.querySelectorAll('.cc-row-list,.k-grid').forEach(el=>{
    const rows=el.querySelectorAll('.cc-row,.cc-card');
    if(rows.length===1&&rows[0].textContent.includes('加载中')){
      el.innerHTML='<div style="color:#86868b;font-size:13px;padding:16px 0;text-align:center">🔒 登录后查看详细数据</div>';
    }
  });
}

document.addEventListener('DOMContentLoaded',load);

// --- Command Actions ---
async function renderCron(){
  const token=CC.getToken();
  const list=document.getElementById('cron-list');
  if(!list)return;
  if(!token){list.innerHTML='<div class="cc-row" style="cursor:default;opacity:.5"><div class="cc-row-body"><div class="cc-row-title">登录后查看</div></div></div>';return;}
  try{
    const r=await CC.fetch('/api/actions/cron-jobs');
    const jobs=await r.json();
    if(!jobs.length){list.innerHTML='<div class="cc-row" style="cursor:default;opacity:.5"><div class="cc-row-body"><div class="cc-row-title">无活跃任务</div></div></div>';return;}
    list.innerHTML=jobs.map(j=>{
      const icon=j.last_status==='ok'?'⏰':'⚠️';
      const badge=j.last_status==='ok'?CC.badge('运行中','on'):CC.badge(j.last_status||'未知','off');
      return '<div class="cc-row" style="cursor:default">'+
        '<div class="cc-row-icon" style="font-size:14px">'+icon+'</div>'+
        '<div class="cc-row-body"><div class="cc-row-title">'+j.name+'</div></div>'+
        '<div class="cc-row-meta">'+badge+'<button class="restart-btn" onclick="triggerCron(\''+j.id+'\',\''+j.name.replace(/'/g,"\\'")+'\')" title="手动触发">▶</button><div style="font-size:12.5px;color:#aeaeb2;margin-top:2px">'+j.schedule+'</div></div>'+
        '</div>';
    }).join('');
  }catch(e){console.error(e);}
}

async function triggerCron(id,name){
  if(!CC.getToken()){CC.toast('请先登录','error');return;}
  if(!confirm('手动触发: '+name+'？'))return;
  try{
    const r=await CC.fetch('/api/actions/trigger-cron',{method:'POST',body:{job_id:id}});
    const d=await r.json();
    if(r.ok)CC.toast(d.message||'已触发','ok');
    else CC.toast(d.detail||d.error||'触发失败','error');
  }catch(e){CC.toast('网络错误','error');}
}

async function restartService(name){
  if(!CC.getToken()){CC.toast('请先登录','error');return;}
  if(!confirm('确定重启 '+name+'？'))return;
  try{
    const r=await CC.fetch('/api/actions/restart-service',{method:'POST',body:{service:name}});
    const d=await r.json();
    if(r.ok){CC.toast(d.message||'已重启','ok');setTimeout(load,2000);}
    else CC.toast(d.detail||d.error||'重启失败','error');
  }catch(e){CC.toast('网络错误','error');}
}

// --- Global Search ---
let _searchTimer;
document.getElementById('global-search-input').addEventListener('input',function(e){
  clearTimeout(_searchTimer);
  const q=e.target.value.trim();
  const box=document.getElementById('search-results');
  if(!q||q.length<2){box.className='search-results';box.innerHTML='';return;}
  _searchTimer=setTimeout(async()=>{
    try{
      const [docsRes,knRes]=await Promise.allSettled([
        fetch('/api/docs/search?q='+encodeURIComponent(q)),
        fetch('/api/knowledge/search?q='+encodeURIComponent(q)+'&limit=5')
      ]);
      var html='';
      if(docsRes.status==='fulfilled'){
        const data=await docsRes.value.json();
        if(data.length){
          html+='<div class="sr-item" style="padding:6px 16px;font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;pointer-events:none">📄 文档</div>';
          html+=data.slice(0,6).map(d=>
            '<a class="sr-item" href="/docs/'+d.path+'">'+
            '<div class="sr-folder">'+d.folder+'</div>'+
            '<div class="sr-title">'+d.title+'</div></a>'
          ).join('');
        }
      }
      if(knRes.status==='fulfilled'){
        const kdata=await knRes.value.json();
        if(kdata.length){
          html+='<div class="sr-item" style="padding:6px 16px;font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;pointer-events:none;border-top:1px solid rgba(0,0,0,.05)">🧠 知识库</div>';
          html+=kdata.slice(0,5).map(k=>
            '<a class="sr-item" href="/knowledge" onclick="localStorage.setItem(\'k-search\',\''+k.title.replace(/'/g,"\\'")+'\')">'+
            '<div class="sr-folder">'+(k.project||k.type||'')+'</div>'+
            '<div class="sr-title">'+k.title+'</div></a>'
          ).join('');
        }
      }
      if(!html) html='<div class="sr-item"><div class="sr-title" style="color:#888">无结果</div></div>';
      box.innerHTML=html;
      box.className='search-results open';
    }catch(e){console.error(e);}
  },300);
});
document.addEventListener('click',function(e){
  if(!e.target.closest('.global-search'))
    document.getElementById('search-results').className='search-results';
});
