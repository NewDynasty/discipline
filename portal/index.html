<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:#fff;color:#1d1d1f;-webkit-font-smoothing:antialiased}

  /* NAV — handled by shared-nav.js */

  /* HERO */
  .hero{text-align:center;padding:90px 22px 50px;max-width:980px;margin:0 auto}
  .hero h1{font-size:56px;font-weight:800;letter-spacing:-2.5px;line-height:1.05;margin-bottom:8px}
  .hero-sub{font-size:19px;color:#86868b;font-weight:400;letter-spacing:-.2px}

  /* STATUS */
  .status{display:flex;justify-content:center;gap:20px;padding:0 22px 60px;flex-wrap:wrap;font-size:13px;color:#86868b}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:4px}
  .dot.on{background:#30d158}
  .dot.off{background:#d2d2d7}

  /* SECTIONS */
  .section{max-width:980px;margin:0 auto;padding:60px 22px}
  .sec-head{margin-bottom:32px}
  .sec-eyebrow{font-size:13.5px;font-weight:600;color:#86868b;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
  .sec-title{font-size:36px;font-weight:800;letter-spacing:-1.5px;line-height:1.1}
  .sec-sub{font-size:15px;color:#86868b;margin-top:6px}

  /* DIVIDER */
  .divider{max-width:980px;margin:0 auto;height:1px;background:#e5e5ea}

  /* QUICK ACCESS */
  .quick-row{display:flex;gap:10px;flex-wrap:wrap}
  .quick-pill{display:flex;align-items:center;gap:7px;padding:10px 18px;background:#f5f5f7;border-radius:980px;text-decoration:none;color:#1d1d1f;font-size:14.5px;font-weight:500;transition:all .2s}
  .quick-pill:hover{background:#e8e8ed}
  .quick-pill .qp-icon{font-size:16px}

  /* ROW LIST */
  .row-list{border-top:1px solid #e5e5ea}
  .row{display:flex;align-items:center;padding:18px 0;border-bottom:1px solid #e5e5ea;text-decoration:none;color:#1d1d1f;transition:background .12s}
  .row:hover{background:#fafafa;margin:0 -22px;padding:18px 22px;border-color:transparent}
  .row:hover+.row{border-top-color:transparent}
  .row-icon{font-size:22px;width:44px;height:44px;background:#f5f5f7;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-right:16px;flex-shrink:0}
  .row-body{flex:1;min-width:0}
  .row-title{font-size:15px;font-weight:600;letter-spacing:-.2px;margin-bottom:1px}
  .row-desc{font-size:13.5px;color:#86868b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row-meta{text-align:right;margin-left:16px;flex-shrink:0}
  .row-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:980px;display:inline-block}
  .row-badge.on{background:#e8f8ed;color:#30d158}
  .row-badge.dev{background:#fff4e0;color:#c88200}
  .row-badge.off{background:#f5f5f7;color:#8e8e93}
  .row-port{font-size:12.5px;color:#aeaeb2;font-variant-numeric:tabular-nums;margin-top:2px}
  .health-tags{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap}
  .health-tag{font-size:11px;padding:1px 6px;border-radius:4px;background:rgba(0,0,0,.04);color:#86868b;font-variant-numeric:tabular-nums}
  .health-tag.latency{color:#30d158}
  .health-tag.uptime{color:#0071e3}
  .health-tag.offline-since{color:#ff6b6b}
  [data-theme="dark"] .health-tag{background:rgba(255,255,255,.06)}
  .row-arrow{color:#0071e3;font-size:18px;font-weight:300;margin-left:10px}

  /* KANBAN cards */
  .k-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .k-card{padding:20px;background:#f5f5f7;border-radius:14px;text-decoration:none;color:#1d1d1f;transition:background .15s}
  .k-card:hover{background:#e8e8ed}
  .k-name{font-size:15px;font-weight:600;margin-bottom:3px}
  .k-count{font-size:13px;color:#86868b}

  footer{text-align:center;padding:56px 22px;font-size:12.5px;color:#c7c7cc;border-top:1px solid #e5e5ea;max-width:980px;margin:0 auto}

  /* Loading shimmer */
  .loading{opacity:.5;pointer-events:none}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:.8}}
  .loading *{animation:pulse 1.5s infinite}

  @media(max-width:768px){
    .hero h1{font-size:34px}
    .hero{padding:60px 18px 36px}
    .hero-sub{font-size:16px}
    .sec-title{font-size:26px}
    .k-grid{grid-template-columns:1fr}
    .quick-row{gap:6px}
    .quick-pill{font-size:13.5px;padding:8px 14px}
    .status{gap:12px;padding-bottom:40px;font-size:12.5px}

    /* Nav mobile handled by shared-nav.js */

    /* Row items: stack meta below on very narrow screens */
    .row{flex-wrap:wrap}
    .row-meta{margin-left:0;margin-top:6px;width:100%;text-align:left}
    .row:hover{margin:0;padding:18px 22px}

    /* Sections tighter spacing */
    .section{padding:40px 16px}

    footer{padding:36px 22px}

    /* Global search mobile */
    .global-search{margin:14px 0 0}
    .search-results{max-height:50vh}
    .sr-title{font-size:16px}
  }

  /* Theme + hamburger handled by shared-nav.js */

  /* ========== DARK THEME ========== */
  [data-theme="dark"] body{background:#0a0a0f;color:#e2e8f0}
  [data-theme="dark"] .hero-sub{color:#94a3b8}
  [data-theme="dark"] .status{color:#94a3b8}
  [data-theme="dark"] .divider{background:#1e293b}
  [data-theme="dark"] .sec-eyebrow{color:#94a3b8}
  [data-theme="dark"] .sec-sub{color:#94a3b8}
  [data-theme="dark"] .quick-pill{background:#1e293b;color:#e2e8f0}
  [data-theme="dark"] .quick-pill:hover{background:#334155}
  .qp-status{display:inline-block;width:10px;height:10px;border-radius:50%;margin-left:6px;vertical-align:middle;transition:background .3s,box-shadow .3s;background:#ccc}
  .qp-status.on{background:#34c759;box-shadow:0 0 6px rgba(52,199,89,.4)}
  .qp-status.off{background:#ff6b6b}
  [data-theme="dark"] .qp-status{background:#475569}
  [data-theme="dark"] .quick-pill:hover{background:#334155}
  [data-theme="dark"] .row-list{border-top-color:#1e293b}
  [data-theme="dark"] .row{color:#e2e8f0;border-bottom-color:#1e293b}
  [data-theme="dark"] .row:hover{background:#1e293b}
  [data-theme="dark"] .row-icon{background:#1e293b}
  [data-theme="dark"] .row-desc{color:#94a3b8}
  [data-theme="dark"] .row-arrow{color:#f59e0b}
  [data-theme="dark"] .row-badge.on{background:#052e16;color:#4ade80}
  [data-theme="dark"] .row-badge.dev{background:#451a03;color:#fbbf24}
  [data-theme="dark"] .row-badge.off{background:#1e293b;color:#64748b}
  [data-theme="dark"] .row-port{color:#64748b}
  [data-theme="dark"] .k-card{background:#1e293b;color:#e2e8f0}
  [data-theme="dark"] .k-card:hover{background:#334155}
  [data-theme="dark"] .k-count{color:#94a3b8}
  [data-theme="dark"] footer{color:#475569;border-top-color:#1e293b}


</style>
<style>
.restart-btn{background:none;border:1px solid rgba(0,0,0,.12);border-radius:6px;padding:2px 8px;font-size:16px;cursor:pointer;color:#888;transition:all .2s;margin-right:6px;}
.restart-btn:hover{background:#0071e3;color:#fff;border-color:#0071e3;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);padding:12px 28px;border-radius:12px;font-size:14px;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;background:#333;color:#fff;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{background:#e8453c;}
.toast.ok{background:#34c759;}
.global-search{position:relative;max-width:520px;margin:18px auto 0;}
.global-search input{width:100%;padding:10px 16px;border-radius:10px;border:1px solid rgba(0,0,0,.1);font-size:15px;background:rgba(255,255,255,.7);outline:none;transition:border .2s;}
.global-search input:focus{border-color:#0071e3;}
[data-theme="dark"] .global-search input{background:rgba(255,255,255,.08);color:#e2e8f0;border-color:rgba(255,255,255,.12);}
.search-results{position:absolute;top:100%;left:0;right:0;background:#fff;border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.12);max-height:320px;overflow-y:auto;display:none;z-index:100;margin-top:4px;}
.search-results.open{display:block;}
.sr-item{padding:10px 16px;border-bottom:1px solid rgba(0,0,0,.05);cursor:pointer;text-decoration:none;color:inherit;display:block;}
.sr-item:hover{background:rgba(0,113,227,.06);}
.sr-item:last-child{border:none;}
.sr-folder{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;}
.sr-title{font-size:14px;font-weight:500;margin-top:2px;}
[data-theme="dark"] .search-results{background:#1e1e2e;box-shadow:0 8px 30px rgba(0,0,0,.4);}
[data-theme="dark"] .sr-item:hover{background:rgba(0,113,227,.15);}
[data-theme="dark"] .sr-folder{color:#666;}
.checkin-bar{max-width:980px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.7);border-radius:14px;border:1px solid rgba(0,0,0,.06);margin-top:14px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.cb-left{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:500;}
.cb-icon{font-size:20px;}
.cb-btn{background:#111;color:#fff;border:none;padding:8px 28px;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;}
.cb-btn:hover{background:#0071e3;transform:scale(1.03);}
.cb-btn:disabled{background:#ccc;cursor:default;transform:none;}
.cb-done{color:#34c759;font-weight:600;}
[data-theme="dark"] .checkin-bar{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.08);}
[data-theme="dark"] .cb-btn{background:#f59e0b;color:#0a0a0f;}
@media(max-width:768px){.checkin-bar{margin:10px 16px 0;padding:12px 16px;border-radius:12px;}.cb-btn{padding:10px 32px;font-size:16px;}}
  .mini-cal{max-width:980px;margin:12px auto 0;display:flex;gap:4px;flex-wrap:wrap;padding:0 22px;}
  .mc-cell{width:15px;height:15px;border-radius:3px;background:#e8e8ed;transition:transform .15s;cursor:default}
  .mc-cell.pass{background:#34c759;}
  .mc-cell.fail{background:#ff6b6b;}
  .mc-cell.future{background:transparent;border:1px dashed #c7c7cc;}
  .mc-cell:hover{transform:scale(1.3);z-index:1}
  .mc-cell.today{box-shadow:0 0 0 2px #0071e3;}
  [data-theme="dark"] .mc-cell{background:rgba(255,255,255,.06);}
  [data-theme="dark"] .mc-cell.pass{background:#34c759;}
  [data-theme="dark"] .mc-cell.fail{background:#ff6b6b;}
  [data-theme="dark"] .mc-cell.future{border-color:rgba(255,255,255,.1);}
@media(max-width:768px){.mini-cal{padding:0 16px;gap:2px;}.mc-cell{width:11px;height:11px;}}
</style>
</head>
<body>
<!-- Auth handled by shared-nav.js -->

<div class="hero">
  <h1>Command Center</h1>
  <div class="hero-sub">项目、服务、研究，一目了然。</div>
  <div class="global-search">
    <input type="text" id="global-search-input" placeholder="搜索文档、知识库、看板..." autocomplete="off">

<div class="checkin-bar" id="checkin-bar">

<script>
// Auth state
// Clock
function tick(){const el=document.getElementById('clock');if(!el)return;const d=new Date();el.textContent=d.toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',weekday:'short',hour:'2-digit',minute:'2-digit',hour12:false})}
tick();setInterval(tick,1000);

// API helper
async function api(path){
  const opts={};
  const token=localStorage.getItem('cc_token');
  if(token)opts.headers={'Authorization':'Bearer '+token};
  try{const r=await fetch(path,opts);if(!r.ok)throw new Error(r.status);return await r.json()}
  catch(e){console.warn('API '+path+' failed:',e);return null}
}

// Type tag colors
const typeColors={compare:'#0071e3',debug:'#ff9500',pitfall:'#ff3b30',tech:'#30d158'};
function getTypeFromTitle(t){
  const l=t.toLowerCase();
  if(l.startsWith('compare'))return'Compare';
  if(l.startsWith('debug'))return'Debug';
  if(l.startsWith('pitfall'))return'Pitfall';
  if(l.startsWith('tech'))return'Tech';
  return'Research';
}
function typeColor(t){return typeColors[t.toLowerCase()]||'#0071e3'}

// Infra icons
const infraIcons={'Hermes Gateway':'🟢','Early Rise':'🟢','Codex Server':'🟢','Obsidian Kanban':'🟢','Sync-Hub':'⚪','RSSHub':'⚪'};
const infraDescs={'Hermes Gateway':'macOS 主服务。Discord / 飞书 / WebUI','Early Rise':'早起打卡。FastAPI + SQLite','Codex Server':'CLI 智能体','Obsidian Kanban':'看板桥接插件 v1.5.0','Sync-Hub':'内网多设备同步，离线','RSSHub':'本地 RSS 聚合，离线'};

// Health formatting helpers
function fmtDuration(secs){
  if(secs<60)return secs+'s';
  if(secs<3600)return Math.floor(secs/60)+'m '+secs%60+'s';
  const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60);
  return h+'h '+m+'m';
}
function fmtRelTime(ts){
  const diff=Math.floor(Date.now()/1000-ts);
  if(diff<60)return '离线 '+diff+'s';
  if(diff<3600)return '离线 '+Math.floor(diff/60)+'m';
  if(diff<86400)return '离线 '+Math.floor(diff/3600)+'h';
  return '离线 '+Math.floor(diff/86400)+'d';
}

// Project icons by tag
const projectIcons={web:'📄',python:'🐍',game:'🎮',unity:'🏗️',godot:'🏜️',ai:'🤖',pipeline:'⚡',discipline:'☀️',research:'💡',monitor:'📡'};

function renderProjects(data){
  if(!data||!data.projects)return;
  const list=document.getElementById('projects-list');
  if(!list)return;
  list.innerHTML=data.projects.map(p=>{
    const icon=projectIcons[(p.tags||[])[0]]||'📦';
    const statusBadge=p.status==='completed'?'<span class="row-badge on">✅ 已完结</span>':
      p.status==='paused'?'<span class="row-badge off">暂停</span>':
      '<span class="row-badge dev">开发中</span>';
    const portStr=p.port?'<div class="row-port">:'+p.port+'</div>':'';
    const pct=p.completion||0;
    const pctStr=pct>0?'<div class="row-port">'+pct+'%</div>':'';
    const github=p.github?'https://github.com/'+p.github:'#';
    const techStr=(p.tech_stack||[]).slice(0,3).join(' · ');
    const desc=(p.description||'')+(techStr?' — '+techStr:'');
    const opacity=p.status==='paused'?' style="opacity:.55"':'';
    const href=p.url||github;
    return '<a class="row" href="'+href+'"'+opacity+'>'+
      '<div class="row-icon">'+icon+'</div>'+
      '<div class="row-body"><div class="row-title">'+p.project+'</div><div class="row-desc">'+desc+'</div></div>'+
      '<div class="row-meta">'+statusBadge+portStr+pctStr+'</div>'+
      '</a>';
  }).join('');
}

// Auth token (shared-nav.js handles login UI)
let authToken = localStorage.getItem('cc_token') || '';

// Auth-aware fetch wrapper
async function authFetch(path, opts = {}) {
  const token = localStorage.getItem('cc_token');
  if (token) {
    opts.headers = opts.headers || {};
    opts.headers['Authorization'] = 'Bearer ' + token;
  }
  return fetch(path, opts);
}

// Load all data
async function load(){
  const [status,research,kanban,er,projects]=await Promise.all([
    api('/api/portal/status'),
    api('/api/portal/research'),
    api('/api/portal/kanban'),
    api('/api/portal/earlyrise'),
    api('/api/projects')
  ]);

  // Status bar
  if(status){
    const bar=document.getElementById('status-bar');
    bar.innerHTML=status.map(s=>'<span><span class="dot '+(s.online?'on':'off')+'"></span>'+s.name+'</span>').join('');
  }

  // Infra list
  if(status){
    const list=document.getElementById('infra-list');
    const managedServices=['discipline','hermes-gateway'];
    list.innerHTML=status.map(s=>{
      const icon=infraIcons[s.name]||(s.online?'🟢':'⚪');
      const desc=infraDescs[s.name]||'';
      const isLink=s.online&&s.url&&s.url!=='#';
      const tag=isLink?'a':'div';
      const href=isLink?' href="'+s.url+'"':'';
      const opacity=s.online?'':' style="opacity:.45"';
      const bg=s.online?' style="background:#e8f8ed"':'';
      const canRestart=managedServices.includes(s.name);
      const restartBtn=canRestart?'<button class="restart-btn" onclick="event.preventDefault();restartService(\''+s.name+'\')" title="重启">↻</button>':'';
      // Health tags
      let tags='';
      if(s.online&&s.latency_ms!==null&&s.latency_ms!==undefined) tags+='<span class="health-tag latency">'+s.latency_ms+'ms</span>';
      if(s.online&&s.uptime_secs>0) tags+='<span class="health-tag uptime">'+fmtDuration(s.uptime_secs)+'</span>';
      if(!s.online&&s.last_up) tags+='<span class="health-tag offline-since">'+fmtRelTime(s.last_up)+'</span>';
      return '<'+tag+' class="row"'+href+' style="cursor:default'+opacity+'">'+
        '<div class="row-icon"'+bg+'>'+icon+'</div>'+
        '<div class="row-body"><div class="row-title">'+s.name+'</div><div class="row-desc">'+desc+'</div>'+(tags?'<div class="health-tags">'+tags+'</div>':'')+'</div>'+
        '<div class="row-meta">'+restartBtn+'<div class="row-port">:'+s.port+'</div></div>'+
        '</'+tag+'>';
    }).join('');
  }

  // Early Rise streak
  if(er&&er.streak!==undefined){
    const el=document.getElementById('er-desc');
    if(el)el.textContent='早起打卡追踪。连续 '+er.streak+' 天达标，共 '+er.total+' 次打卡';
  }

  // Checkin bar status
  try{
    const today=await api('/api/checkin/today');
    const statusEl=document.getElementById('cb-status');
    const btn=document.getElementById('cb-btn');
    if(today&&today.wake_time){
      statusEl.innerHTML='今日 <span class="cb-done">'+today.wake_time+'</span> 已打卡 · 连续 '+((er&&er.streak)||'?')+' 天';
      btn.style.display='none';
    }else{
      statusEl.textContent='今日尚未打卡';
      btn.style.display='inline-block';
    }
  }catch(e){document.getElementById('cb-status').textContent='打卡状态未知';}

  // Mini calendar heatmap (always render, data or not)
  try{
    const hm=await api('/api/heatmap')||[];
    const cal=document.getElementById('mini-cal');
    cal.innerHTML='';
    const now=new Date();
    const y=now.getFullYear(),m=now.getMonth();
    const daysInMonth=new Date(y,m+1,0).getDate();
    const map={};
    hm.forEach(r=>{map[r.date]=r.pass;});
    const pad=new Date(y,m,1).getDay();
    for(let i=0;i<pad;i++){const c=document.createElement('div');c.className='mc-cell';c.style.background='transparent';cal.appendChild(c);}
    for(let d=1;d<=daysInMonth;d++){
      const ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      const c=document.createElement('div');
      c.className='mc-cell';
      c.title=ds;
      if(ds===now.toISOString().slice(0,10))c.classList.add('today');
      if(d>now.getDate()){c.classList.add('future');}
      else if(map[ds]===1||map[ds]===true){c.classList.add('pass');}
      else if(map[ds]===0||map[ds]===false){c.classList.add('fail');}
      cal.appendChild(c);
    }
  }catch(e){console.error('heatmap',e);}

  // Quick-access service status dots
  try{
    const status=await api('/api/portal/status');
    const map={'Hermes Gateway':'hermes','Early Rise':'earlyrise','Codex Server':'codex','Obsidian Kanban':'kanban'};
    (status||[]).forEach(s=>{
      const id=map[s.name];
      if(id){
        const dot=document.getElementById('qps-'+id);
        if(dot){dot.className='qp-status '+(s.online?'on':'off');dot.title=s.name+(s.online?' · 在线':' · 离线');}
      }
    });
  }catch(e){console.error('status dots',e);}

  // Projects (API-driven)
  renderProjects(projects);

  // Cron jobs (API-driven)
  renderCron();

  // Research list
  if(research&&research.length>0){
    const list=document.getElementById('research-list');
    list.innerHTML=research.map(n=>{
      const typ=getTypeFromTitle(n.title);
      const col=typeColor(typ);
      const label=n.title.replace(/^(compare|debug|pitfall|tech)-/i,'');
      const display=label.charAt(0).toUpperCase()+label.slice(1).replace(/-/g,' ');
      return '<a class="row" href="'+(n.url||'#')+'">'+
        '<div class="row-body">'+
        '<div class="row-title" style="color:'+col+';font-size:13.5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">'+typ+'</div>'+
        '<div class="row-desc" style="color:#1d1d1f">'+display+'</div>'+
        '</div><div class="row-arrow">›</div></a>';
    }).join('');
  }

  // Kanban
  if(kanban&&kanban.length>0){
    const grid=document.getElementById('kanban-grid');
    grid.innerHTML=kanban.map(b=>
      '<a class="k-card" href="'+(b.url||'#')+'">'+
      '<div class="k-name">'+b.name+'</div>'+
      '<div class="k-count">'+b.count+'</div></a>'
    ).join('');
  }

  // Fallback: replace stale "加载中..." with friendly guest prompt
  document.querySelectorAll('.row-list,.k-grid').forEach(el=>{
    const rows=el.querySelectorAll('.row,.k-card');
    if(rows.length===1&&rows[0].textContent.includes('加载中')){
      el.innerHTML='<div style="color:#86868b;font-size:13px;padding:16px 0;text-align:center">🔒 登录后查看详细数据</div>';
    }
  });

  // Init auth UI
  updateAuthUI();
}

document.addEventListener('DOMContentLoaded',load);

// --- Command Actions ---
async function renderCron(){
  const token=localStorage.getItem('cc_token');
  const list=document.getElementById('cron-list');
  if(!list)return;
  if(!token){list.innerHTML='<div class="row" style="cursor:default;opacity:.5"><div class="row-body"><div class="row-title">登录后查看</div></div></div>';return;}
  try{
    const r=await fetch('/api/actions/cron-jobs',{headers:{'Authorization':'Bearer '+token}});
    const jobs=await r.json();
    if(!jobs.length){list.innerHTML='<div class="row" style="cursor:default;opacity:.5"><div class="row-body"><div class="row-title">无活跃任务</div></div></div>';return;}
    list.innerHTML=jobs.map(j=>{
      const icon=j.last_status==='ok'?'⏰':j.last_status==='error'?'⚠️':'⏰';
      const badge=j.last_status==='ok'?'<span class="row-badge on">运行中</span>':'<span class="row-badge off">'+(j.last_status||'未知')+'</span>';
      return '<div class="row" style="cursor:default">'+
        '<div class="row-icon" style="font-size:14px">'+icon+'</div>'+
        '<div class="row-body"><div class="row-title">'+j.name+'</div></div>'+
        '<div class="row-meta">'+badge+'<button class="restart-btn" onclick="triggerCron(\''+j.id+'\',\''+j.name.replace(/'/g,"\\'")+'\')" title="手动触发">▶</button><div class="row-port">'+j.schedule+'</div></div>'+
        '</div>';
    }).join('');
  }catch(e){console.error(e);}
}

async function doQuickCheckin(){
  const token=localStorage.getItem('cc_token');
  if(!token){showToast('请先登录','error');return;}
  const btn=document.getElementById('cb-btn');
  btn.disabled=true;btn.textContent='打卡中...';
  const now=new Date();
  const time=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  try{
    const r=await fetch('/api/checkin',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({wake_time:time})});
    const d=await r.json();
    if(r.ok){
      document.getElementById('cb-status').innerHTML='今日 <span class="cb-done">'+time+'</span> 已打卡 ✓';
      btn.style.display='none';
      showToast('打卡成功 '+time,'ok');
    }else{showToast(d.detail||'打卡失败','error');btn.disabled=false;btn.textContent='打卡';}
  }catch(e){showToast('网络错误','error');btn.disabled=false;btn.textContent='打卡';}
}

async function triggerCron(id,name){
  const token=localStorage.getItem('cc_token');
  if(!token){showToast('请先登录','error');return;}
  if(!confirm('手动触发: '+name+'？'))return;
  try{
    const r=await fetch('/api/actions/trigger-cron',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({job_id:id})});
    const d=await r.json();
    if(r.ok)showToast(d.message||'已触发','ok');
    else showToast(d.detail||d.error||'触发失败','error');
  }catch(e){showToast('网络错误','error');}
}

async function restartService(name){
  const token=localStorage.getItem('cc_token');
  if(!token){showToast('请先登录','error');return;}
  if(!confirm('确定重启 '+name+'？'))return;
  try{
    const r=await fetch('/api/actions/restart-service',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({service:name})});
    const d=await r.json();
    if(r.ok){showToast(d.message||'已重启','ok');setTimeout(load,2000);}
    else showToast(d.detail||d.error||'重启失败','error');
  }catch(e){showToast('网络错误','error');}
}

function showToast(msg,type){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';document.body.appendChild(t);}
  t.textContent=msg;
  t.className='toast show '+(type||'');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.className='toast',3000);
}

// --- Global Search ---
let _searchTimer;
document.getElementById('global-search-input').addEventListener('input',function(e){
  clearTimeout(_searchTimer);
  const q=e.target.value.trim();
  const box=document.getElementById('search-results');
  if(!q||q.length<2){box.className='search-results';box.innerHTML='';return;}
  _searchTimer=setTimeout(async()=>{
    try{
      // Fetch both docs and knowledge in parallel
      const [docsRes, knRes] = await Promise.allSettled([
        fetch('/api/docs/search?q='+encodeURIComponent(q)),
        fetch('/api/knowledge/search?q='+encodeURIComponent(q)+'&limit=5')
      ]);
      var html = '';
      // Docs results
      if(docsRes.status==='fulfilled'){
        const data=await docsRes.value.json();
        if(data.length){
          html += '<div class="sr-item" style="padding:6px 16px;font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;pointer-events:none">📄 文档</div>';
          html += data.slice(0,6).map(d=>
            '<a class="sr-item" href="/docs/'+d.path+'">'+
            '<div class="sr-folder">'+d.folder+'</div>'+
            '<div class="sr-title">'+d.title+'</div></a>'
          ).join('');
        }
      }
      // Knowledge results
      if(knRes.status==='fulfilled'){
        const kdata=await knRes.value.json();
        if(kdata.length){
          html += '<div class="sr-item" style="padding:6px 16px;font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;pointer-events:none;border-top:1px solid rgba(0,0,0,.05)">🧠 知识库</div>';
          html += kdata.slice(0,5).map(k=>
            '<a class="sr-item" href="/knowledge" onclick="localStorage.setItem(\'k-search\',\''+k.title.replace(/'/g,"\\'")+'\')">'+
            '<div class="sr-folder">'+(k.project||k.type||'')+'</div>'+
            '<div class="sr-title">'+k.title+'</div></a>'
          ).join('');
        }
      }
      if(!html){
        html='<div class="sr-item"><div class="sr-title" style="color:#888">无结果</div></div>';
      }
      box.innerHTML=html;
      box.className='search-results open';
    }catch(e){console.error(e);}
  },300);
});
// Close search on outside click
document.addEventListener('click',function(e){
  if(!e.target.closest('.global-search'))
    document.getElementById('search-results').className='search-results';
});
