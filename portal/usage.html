<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>用量面板 · Command Center</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f2f2f7;color:#1d1d1f;min-height:100vh}
[data-theme="dark"] body,.dark body{background:#0a0a0f;color:#e2e8f0}
.nav{background:rgba(255,255,255,.72);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.06);padding:12px 24px;display:flex;align-items:center;gap:24px;position:sticky;top:0;z-index:10}
[data-theme="dark"] .nav{background:rgba(10,10,15,.85);border-bottom-color:#1e293b}
.nav a{text-decoration:none;color:#86868b;font-size:14px;transition:color .2s}
.nav a:hover{color:#0071e3}
[data-theme="dark"] .nav a{color:#94a3b8}
[data-theme="dark"] .nav a:hover{color:#f59e0b}
.nav-brand{font-weight:700;color:#1d1d1f!important;font-size:15px!important}
[data-theme="dark"] .nav-brand{color:#e2e8f0!important}
.container{max-width:900px;margin:0 auto;padding:32px 24px}
h1{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
.sub{font-size:14px;color:#86868b;margin-bottom:32px}
[data-theme="dark"] .sub{color:#64748b}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
.card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
[data-theme="dark"] .card{background:#1a1a2e;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.card-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
.card-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(0,113,227,.1);color:#0071e3;font-weight:600}
[data-theme="dark"] .card-badge{background:rgba(245,158,11,.1);color:#f59e0b}
.gauge-row{display:flex;gap:24px;margin-bottom:16px}
.gauge{flex:1;text-align:center}
.gauge-ring{position:relative;width:80px;height:80px;margin:0 auto 8px}
.gauge-ring svg{transform:rotate(-90deg)}
.gauge-ring .bg{fill:none;stroke:rgba(0,0,0,.06);stroke-width:8}
.gauge-ring .fg{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .6s}
.gauge-percent{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18px;font-weight:800;letter-spacing:-.5px}
.gauge-label{font-size:12px;color:#86868b;margin-top:4px}
[data-theme="dark"] .gauge-ring .bg{stroke:rgba(255,255,255,.08)}
[data-theme="dark"] .gauge-label{color:#64748b}
.green .fg{stroke:#34c759}
.yellow .fg{stroke:#f59e0b}
.red .fg{stroke:#ff3b30}
.detail{margin-top:16px;padding-top:16px;border-top:1px solid rgba(0,0,0,.06)}
[data-theme="dark"] .detail{border-top-color:rgba(255,255,255,.06)}
.detail-item{display:flex;justify-content:space-between;padding:6px 0;font-size:13px}
.detail-label{color:#86868b}
[data-theme="dark"] .detail-label{color:#64748b}
.detail-value{font-weight:600;font-variant-numeric:tabular-nums}
.extra-info{font-size:12px;color:#86868b;margin-top:18px;padding-top:14px;border-top:1px solid rgba(0,0,0,.06);line-height:1.6}
[data-theme="dark"] .extra-info{color:#64748b;border-top-color:rgba(255,255,255,.06)}
.extra-info span{color:#1d1d1f;font-weight:600}
[data-theme="dark"] .extra-info span{color:#e2e8f0}
.loading{text-align:center;padding:60px;color:#86868b}
.error{text-align:center;padding:60px;color:#ff3b30}
.theme-toggle{background:none;border:1px solid rgba(0,0,0,.12);border-radius:8px;padding:4px 12px;cursor:pointer;font-size:14px;color:#86868b;margin-left:auto}
[data-theme="dark"] .theme-toggle{border-color:#334155;color:#94a3b8}
@media(max-width:640px){.container{padding:20px 16px}.cards{grid-template-columns:1fr}.gauge-ring{width:64px;height:64px}}
</style>
</head>
<body>
<nav class="nav">
  <a class="nav-brand" href="/portal">⚡ Command Center</a>
  <a href="/portal#quick">快速访问</a>
  <a href="/docs">📚 文档</a>
  <a href="/usage" style="color:#0071e3;font-weight:600">📊 用量</a>
  <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌓</button>
</nav>
<div class="container">
  <h1>AI 用量面板</h1>
  <p class="sub">z.ai (GLM) 和 Kimi (Moonshot) 的实时配额使用情况</p>
  <div id="content" class="loading">加载中...</div>
</div>
<script>
const C=2*Math.PI*32;

function ring(pct){return pct>=80?'red':pct>=50?'yellow':'green'}
function ringColor(pct){return pct>=80?'#ff3b30':pct>=50?'#f59e0b':'#34c759'}

function gaugeHtml(label,pct,cls){
  const offset=C*(1-pct/100);
  return '<div class="gauge"><div class="gauge-ring '+cls+'"><svg viewBox="0 0 72 72"><circle class="bg" cx="36" cy="36" r="32"/><circle class="fg" cx="36" cy="36" r="32" stroke-dasharray="'+C+'" stroke-dashoffset="'+offset+'"/></svg><div class="gauge-percent">'+Math.round(pct)+'%</div></div><div class="gauge-label">'+label+'</div></div>';
}

function timeLeft(hours){
  if(!hours||hours<=0)return '即将重置';
  const h=Math.floor(hours),m=Math.round((hours-h)*60);
  return h+'h '+m+'m 后重置';
}

async function load(){
  try{
    const token=localStorage.getItem('cc_token');
    const opts=token?{headers:{'Authorization':'Bearer '+token}}:{};
    const r=await fetch('/api/usage',opts);
    if(!r.ok)throw new Error(r.status);
    const d=await r.json();
    render(d);
  }catch(e){
    document.getElementById('content').innerHTML='<div class="error">⚠️ 加载失败：'+e.message+'<br><small style="color:#86868b">请先 <a href="/portal" style="color:#0071e3">登录</a></small></div>';
  }
}

function render(d){
  let html='<div class="cards">';

  // z.ai card
  const cal=d.calibration||{};
  const z5h=cal['5h_pct']||0;
  const zwk=cal.weekly_pct||0;
  html+='<div class="card"><div class="card-header"><div class="card-title">🤖 z.ai (GLM)</div><div class="card-badge">'+(cal.plan||'?').toUpperCase()+'</div></div>';
  html+='<div class="gauge-row">'+gaugeHtml('5小时',z5h,ring(z5h))+gaugeHtml('本周',zwk,ring(zwk))+'</div>';
  html+='<div class="detail">';
  html+='<div class="detail-item"><span class="detail-label">5h 用量</span><span class="detail-value">'+(cal['5h_prompts_used']||0)+' / '+((cal['5h_prompts_used']||0)/Math.max(z5h/100,.01)).toFixed(0)+' prompts</span></div>';
  html+='<div class="detail-item"><span class="detail-label">本周用量</span><span class="detail-value">'+(cal.weekly_prompts_used||0)+' / '+((cal.weekly_prompts_used||0)/Math.max(zwk/100,.01)).toFixed(0)+' prompts</span></div>';
  html+='<div class="detail-item"><span class="detail-label">5h API 调用</span><span class="detail-value">~'+(cal['5h_api_calls_est']||0).toLocaleString()+'</span></div>';
  html+='<div class="detail-item"><span class="detail-label">本周 API 调用</span><span class="detail-value">~'+(cal.weekly_api_calls_est||0).toLocaleString()+'</span></div>';
  html+='</div>';
  if(cal.weekly_reset_time)html+='<div class="extra-info">⏳ 周配额重置：<span>'+cal.weekly_reset_time+'</span></div>';
  html+='</div>';

  // Kimi card
  const kc=d.kimi_calibration||{};
  const kwk=kc.weekly_pct||0;
  const krl=kc.rate_limit_pct||0;
  html+='<div class="card"><div class="card-header"><div class="card-title">🌙 Kimi (Moonshot)</div><div class="card-badge">'+(kc.plan||'?').toUpperCase()+'</div></div>';
  html+='<div class="gauge-row">'+gaugeHtml('本周',kwk,ring(kwk))+gaugeHtml('速率限制',krl,ring(100-krl))+'</div>';
  html+='<div class="detail">';
  html+='<div class="detail-item"><span class="detail-label">模型</span><span class="detail-value">'+(kc.model||'?')+'</span></div>';
  html+='<div class="detail-item"><span class="detail-label">周重置</span><span class="detail-value">'+timeLeft(kc.weekly_reset_hours)+'</span></div>';
  html+='<div class="detail-item"><span class="detail-label">速率重置</span><span class="detail-value">'+timeLeft(kc.rate_limit_reset_hours)+'</span></div>';
  html+='</div>';
  html+='</div>';

  html+='</div>'; // cards

  // Refresh time
  const ts=Math.max(cal.scraped_at||0,kc.scraped_at||0);
  if(ts)html+='<p style="text-align:center;color:#86868b;font-size:12px;margin-top:32px">📡 数据更新于 '+new Date(ts*1000).toLocaleString('zh-CN')+'</p>';

  document.getElementById('content').innerHTML=html;
}

function toggleTheme(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',isDark?'light':'dark');
  localStorage.setItem('cc_theme',isDark?'light':'dark');
}
(function(){
  const t=localStorage.getItem('cc_theme');
  if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches)){
    document.documentElement.setAttribute('data-theme','dark');
  }
})();

load();
</script>
</body>
</html>
