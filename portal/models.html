<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>模型资源 · Command Center</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:#fff;color:#1d1d1f;-webkit-font-smoothing:antialiased}

  .section{max-width:980px;margin:0 auto;padding:60px 22px}
  .sec-head{margin-bottom:32px}
  .sec-eyebrow{font-size:13.5px;font-weight:600;color:#86868b;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
  .sec-title{font-size:36px;font-weight:800;letter-spacing:-1.5px;line-height:1.1}
  .sec-sub{font-size:15px;color:#86868b;margin-top:6px}
  .divider{max-width:980px;margin:0 auto;height:1px;background:#e5e5ea}

  .hero{text-align:center;padding:90px 22px 50px;max-width:980px;margin:0 auto}
  .hero h1{font-size:56px;font-weight:800;letter-spacing:-2.5px;line-height:1.05;margin-bottom:8px}
  .hero-sub{font-size:19px;color:#86868b;font-weight:400;letter-spacing:-.2px}

  /* Row list */
  .row-list{border-top:1px solid #e5e5ea}
  .row{display:flex;align-items:center;padding:18px 0;border-bottom:1px solid #e5e5ea;cursor:default;transition:background .12s}
  .row:hover{background:#fafafa;margin:0 -22px;padding:18px 22px;border-color:transparent}
  .row:hover+.row{border-top-color:transparent}
  .row-icon{font-size:22px;width:44px;height:44px;background:#f5f5f7;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-right:16px;flex-shrink:0}
  .row-body{flex:1;min-width:0}
  .row-title{font-size:15px;font-weight:600;letter-spacing:-.2px;margin-bottom:1px}
  .row-desc{font-size:13.5px;color:#86868b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row-meta{display:flex;align-items:center;gap:6px;margin-left:16px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
  .pill{font-size:10.5px;font-weight:600;padding:3px 10px;border-radius:980px;display:inline-block;letter-spacing:.2px}
  .pill-primary{background:#e8f8ed;color:#30d158}
  .pill-vision{background:#f3e8ff;color:#8b5cf6}
  .pill-thinking{background:#fff4e0;color:#c88200}
  .pill-free{background:#e8f8ed;color:#30d158}
  .pill-fallback{background:#f5f5f7;color:#8e8e93}
  .row-specs{display:flex;gap:14px;margin-top:3px;font-size:12px;color:#aeaeb2;font-variant-numeric:tabular-nums}
  .row-specs strong{color:#1d1d1f;font-weight:500}

  /* Inline quota bars (inside model rows) */
  .row-quota{margin-top:8px;display:flex;gap:16px;flex-wrap:wrap}
  .rq-item{flex:1;min-width:120px;max-width:220px}
  .rq-label{font-size:11px;display:flex;justify-content:space-between;margin-bottom:2px;color:#aeaeb2}
  .rq-label span:last-child{font-weight:600;color:#1d1d1f}
  .rq-track{height:4px;background:rgba(0,0,0,.06);border-radius:2px;overflow:hidden}
  .rq-fill{height:100%;border-radius:2px;transition:width .8s ease}
  .rq-green{background:#30d158}
  .rq-yellow{background:#f59e0b}
  .rq-red{background:#ff3b30}
  .rq-hint{font-size:10.5px;color:#aeaeb2;margin-top:6px}

  /* Compare Table */
  .table-wrap{overflow-x:auto;border-radius:14px;background:#f5f5f7}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{background:rgba(0,0,0,.03);font-weight:600;text-align:left;padding:12px 14px;border-bottom:2px solid rgba(0,0,0,.06);white-space:nowrap;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:#86868b}
  td{padding:10px 14px;border-bottom:1px solid rgba(0,0,0,.04)}
  tr:hover td{background:rgba(0,113,227,.04)}
  .tag-yes{color:#30d158;font-weight:600}
  .tag-no{color:#d2d2d7}

  /* Chain */
  .chain-wrap{padding:24px;background:#f5f5f7;border-radius:14px}
  .chain{display:flex;align-items:center;justify-content:center;gap:0;flex-wrap:wrap;padding:8px 0}
  .chain-node{background:#fff;border-radius:12px;padding:12px 22px;text-align:center;min-width:130px;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:transform .2s}
  .chain-node:hover{transform:scale(1.05)}
  .cn-name{font-size:14px;font-weight:700;margin-bottom:2px}
  .cn-sub{font-size:11.5px;color:#86868b}
  .chain-arrow{font-size:20px;color:#c7c7cc;padding:0 8px;font-weight:300}
  .chain-hint{font-size:11.5px;color:#86868b;text-align:center;margin-bottom:8px}

  footer{text-align:center;padding:56px 22px;font-size:12.5px;color:#c7c7cc;border-top:1px solid #e5e5ea;max-width:980px;margin:0 auto}

  [data-theme="dark"] body{background:#0a0a0f;color:#e2e8f0}
  [data-theme="dark"] .hero-sub{color:#94a3b8}
  [data-theme="dark"] .divider{background:#1e293b}
  [data-theme="dark"] .sec-eyebrow{color:#94a3b8}
  [data-theme="dark"] .sec-sub{color:#94a3b8}
  [data-theme="dark"] .row-list{border-top-color:#1e293b}
  [data-theme="dark"] .row{border-bottom-color:#1e293b}
  [data-theme="dark"] .row:hover{background:#1e293b}
  [data-theme="dark"] .row-icon{background:#1e293b}
  [data-theme="dark"] .row-desc{color:#94a3b8}
  [data-theme="dark"] .row-specs{color:#64748b}
  [data-theme="dark"] .row-specs strong{color:#e2e8f0}
  [data-theme="dark"] .rq-label{color:#64748b}
  [data-theme="dark"] .rq-label span:last-child{color:#e2e8f0}
  [data-theme="dark"] .rq-track{background:rgba(255,255,255,.06)}
  [data-theme="dark"] .rq-hint{color:#64748b}
  [data-theme="dark"] .pill-primary{background:#052e16;color:#4ade80}
  [data-theme="dark"] .pill-vision{background:#2e1065;color:#c084fc}
  [data-theme="dark"] .pill-thinking{background:#451a03;color:#fbbf24}
  [data-theme="dark"] .pill-free{background:#052e16;color:#4ade80}
  [data-theme="dark"] .pill-fallback{background:#1e293b;color:#64748b}
  [data-theme="dark"] .table-wrap{background:#1e293b}
  [data-theme="dark"] th{background:rgba(255,255,255,.03);border-bottom-color:rgba(255,255,255,.08);color:#94a3b8}
  [data-theme="dark"] td{border-bottom-color:rgba(255,255,255,.04)}
  [data-theme="dark"] tr:hover td{background:rgba(245,158,11,.04)}
  [data-theme="dark"] .tag-yes{color:#4ade80}
  [data-theme="dark"] .tag-no{color:#334155}
  [data-theme="dark"] .chain-wrap{background:#1e293b}
  [data-theme="dark"] .chain-node{background:#0a0a0f;box-shadow:0 1px 4px rgba(0,0,0,.3)}
  [data-theme="dark"] .cn-sub{color:#64748b}
  [data-theme="dark"] .chain-arrow{color:#334155}
  [data-theme="dark"] .chain-hint{color:#64748b}
  [data-theme="dark"] footer{color:#475569;border-top-color:#1e293b}

  @media(max-width:768px){
    .hero h1{font-size:34px}
    .hero{padding:60px 18px 36px}
    .hero-sub{font-size:16px}
    .sec-title{font-size:26px}
    .section{padding:40px 16px}
    .row:hover{margin:0;padding:18px 22px}
    .row-quota{flex-direction:column;gap:6px}
    .rq-item{max-width:none}
    footer{padding:36px 22px}
  }
</style>
</head>
<body>

<div class="hero">
  <h1>模型资源</h1>
  <div class="hero-sub">当前可用 AI 模型 — 特性、配额与链路</div>
</div>

<div class="divider"></div>

<!-- Models (with inline quota) -->
<div class="section">
  <div class="sec-head">
    <div class="sec-eyebrow">模型一览</div>
    <div class="sec-title">有什么可用。</div>
    <div class="sec-sub">8 个模型覆盖推理、视觉、编码、本地推理</div>
  </div>
  <div class="row-list" id="model-list"></div>
</div>

<div class="divider"></div>

<!-- Compare Table -->
<div class="section">
  <div class="sec-head">
    <div class="sec-eyebrow">特性对比</div>
    <div class="sec-title">并排看。</div>
  </div>
  <div class="table-wrap">
    <table id="compare-table"></table>
  </div>
</div>

<div class="divider"></div>

<!-- Fallback Chain -->
<div class="section">
  <div class="sec-head">
    <div class="sec-eyebrow">Fallback 链路</div>
    <div class="sec-title">挂了怎么办。</div>
    <div class="sec-sub">主推理链路自动降级顺序</div>
  </div>
  <div class="chain-wrap">
    <div class="chain-hint">主推理 — GLM-5.1 优先，自动降级</div>
    <div class="chain" id="fallback-chain"></div>
  </div>
</div>

<div class="divider"></div>

<!-- Vision Chain -->
<div class="section">
  <div class="sec-head">
    <div class="sec-eyebrow">视觉链路</div>
    <div class="sec-title">看图说话。</div>
    <div class="sec-sub">图像 / 截图分析自动降级顺序</div>
  </div>
  <div class="chain-wrap">
    <div class="chain-hint">视觉分析 — GPT-5.5 优先，Kimi 兜底</div>
    <div class="chain" id="vision-chain"></div>
  </div>
</div>

<footer>Command Center · Dynasty</footer>

<script>
const MODELS=[
  {id:'glm-5.1',name:'GLM-5.1',icon:'🧠',provider:'z.ai',ctx:'200K',vision:false,thinking:true,cost:'3x',quota:'Coding Plan',role:'主力推理 / 规划',pills:['primary','thinking'],quotaGroup:'zai'},
  {id:'glm-4.7',name:'GLM-4.7',icon:'⚙️',provider:'z.ai',ctx:'200K',vision:false,thinking:false,cost:'1x',quota:'Coding Plan',role:'日常任务 / 编码',pills:['primary'],quotaGroup:'zai'},
  {id:'glm-4.5-air',name:'GLM-4.5-Air',icon:'💨',provider:'z.ai',ctx:'128K',vision:false,thinking:false,cost:'1x',quota:'Coding Plan',role:'Smart Routing 降级',pills:['primary'],quotaGroup:'zai'},
  {id:'kimi-k2.6',name:'Kimi k2.6',icon:'🌙',provider:'Moonshot',ctx:'262K',vision:true,thinking:true,cost:'按量',quota:'并发 3',role:'视觉 / 长文档 / 视频',pills:['vision','thinking'],quotaGroup:'kimi'},
  {id:'gpt-5.5',name:'GPT-5.5',icon:'⚡',provider:'OpenAI Codex',ctx:'200K',vision:true,thinking:false,cost:'ChatGPT Plus',quota:'无限',role:'编码 / 视觉分析',pills:['primary','vision']},
  {id:'ds-v4-pro',name:'DeepSeek V4 Pro',icon:'🔮',provider:'DeepSeek',ctx:'128K',vision:false,thinking:true,cost:'按量',quota:'按量',role:'Fallback 推理',pills:['thinking','fallback']},
  {id:'ds-v4-flash',name:'DeepSeek V4 Flash',icon:'✨',provider:'DeepSeek',ctx:'128K',vision:false,thinking:false,cost:'按量',quota:'按量',role:'轻量快速任务',pills:['fallback']},
  {id:'llama-lan',name:'Llama-LAN',icon:'🖥️',provider:'Win-4080 本地',ctx:'32K',vision:false,thinking:false,cost:'免费',quota:'无限',role:'局域网免费推理',pills:['free']},
];

const PILL_MAP={primary:'pill-primary',vision:'pill-vision',thinking:'pill-thinking',free:'pill-free',fallback:'pill-fallback'};
const PILL_LABEL={primary:'主力',vision:'视觉',thinking:'Thinking',free:'免费',fallback:'备用'};

function barC(p){return p>=80?'rq-red':p>=50?'rq-yellow':'rq-green'}

// Quota data (filled by API)
let _quota={};

function quotaHtml(group){
  if(!_quota||(!_quota.zai&&group==='zai')||(!_quota.kimi&&group==='kimi'))return '';
  const q=_quota[group==='zai'?'zai':'kimi'];
  if(!q)return '';
  return '<div class="row-quota">'+q.bars.map(b=>
    '<div class="rq-item"><div class="rq-label"><span>'+b.label+'</span><span>'+b.text+'</span></div><div class="rq-track"><div class="rq-fill '+barC(b.pct)+'" style="width:'+Math.min(b.pct,100)+'%"></div></div></div>'
  ).join('')+(q.hint?'<div class="rq-hint">'+q.hint+'</div>':'')+'</div>';
}

function renderModels(){
  // Show quota only on the first model of each quota group
  const firstOf={};
  document.getElementById('model-list').innerHTML=MODELS.map(m=>{
    const showQuota=m.quotaGroup&&!firstOf[m.quotaGroup];
    if(m.quotaGroup)firstOf[m.quotaGroup]=true;
    const specs=[
      '<span>Provider <strong>'+m.provider+'</strong></span>',
      '<span>Ctx <strong>'+m.ctx+'</strong></span>',
      '<span>费用 <strong>'+m.cost+'</strong></span>',
      '<span>配额 <strong>'+m.quota+'</strong></span>',
    ];
    if(m.vision)specs.push('<span>视觉 <strong>✓</strong></span>');
    if(m.thinking)specs.push('<span>Thinking <strong>✓</strong></span>');
    return '<div class="row">'+
      '<div class="row-icon">'+m.icon+'</div>'+
      '<div class="row-body">'+
        '<div class="row-title">'+m.name+'</div>'+
        '<div class="row-desc">'+m.role+'</div>'+
        '<div class="row-specs">'+specs.join('')+'</div>'+
        (showQuota?quotaHtml(m.quotaGroup):'')+
      '</div>'+
      '<div class="row-meta">'+m.pills.map(p=>'<span class="pill '+PILL_MAP[p]+'">'+PILL_LABEL[p]+'</span>').join('')+'</div>'+
    '</div>';
  }).join('');
}

function renderTable(){
  const tbl=document.getElementById('compare-table');
  tbl.innerHTML='<thead><tr>'+['模型','Provider','上下文','视觉','Thinking','费用','配额','用途'].map(c=>'<th>'+c+'</th>').join('')+'</tr></thead><tbody>'+
    MODELS.map(m=>'<tr><td><strong>'+m.name+'</strong></td><td>'+m.provider+'</td><td>'+m.ctx+'</td><td>'+(m.vision?'<span class="tag-yes">✓</span>':'<span class="tag-no">—</span>')+'</td><td>'+(m.thinking?'<span class="tag-yes">✓</span>':'<span class="tag-no">—</span>')+'</td><td>'+m.cost+'</td><td>'+m.quota+'</td><td style="color:#86868b">'+m.role+'</td></tr>').join('')+'</tbody>';
}

function renderChain(id,nodes){
  document.getElementById(id).innerHTML=nodes.map((n,i)=>
    '<div class="chain-node"><div class="cn-name">'+n.name+'</div><div class="cn-sub">'+n.provider+'</div></div>'+(i<nodes.length-1?'<div class="chain-arrow">→</div>':'')).join('');
}

// Init
renderModels();
renderTable();
renderChain('fallback-chain',[{name:'GLM-5.1',provider:'z.ai Coding Plan'},{name:'GLM-5.1',provider:'bigmodel.cn Coding Plan'},{name:'DeepSeek V4 Pro',provider:'按量付费 fallback'}]);
renderChain('vision-chain',[{name:'GPT-5.5',provider:'OpenAI Codex'},{name:'Kimi k2.6',provider:'Moonshot'},{name:'GLM-4.6V',provider:'z.ai 视觉 fallback'}]);

(async()=>{
  try{
    const r=await fetch('/api/usage');
    if(!r.ok)return;
    const d=await r.json();
    const cal=d.calibration||{};
    const kc=d.kimi_calibration||{};
    const z5h=cal['5h_pct']||0,zwk=cal.weekly_pct||0;
    const u5=cal['5h_prompts_used']||0,uw=cal.weekly_prompts_used||0;
    const l5=z5h>0?Math.round(u5/(z5h/100)):1600;
    const lw=zwk>0?Math.round(uw/(zwk/100)):8000;
    _quota.zai={
      bars:[
        {label:'5h 窗口',text:u5+' / '+l5,pct:z5h},
        {label:'本周',text:uw+' / '+lw,pct:zwk}
      ],
      hint:cal.weekly_reset_time?'⏳ 周配额重置：'+cal.weekly_reset_time:''
    };
    _quota.kimi={
      bars:[
        {label:'本周用量',text:(kc.weekly_pct||0).toFixed(1)+'%',pct:kc.weekly_pct||0},
        {label:'速率余量',text:(100-(kc.rate_limit_pct||0))+'%',pct:100-(kc.rate_limit_pct||0)}
      ],
      hint:kc.model?'模型 '+kc.model+' · 并发上限 3':''
    };
    renderModels();
  }catch(e){}
})();
</script>
<script src="/static/shared-nav.js?v=6"></script>
</body>
</html>
